version: 2.1

setup: true

parameters:
  run_manual_promote:
    type: boolean
    default: false
    description: "Set to true to manually trigger promotion/submission workflow"
  build_testflight:
    type: boolean
    default: false
    description: "Set to true to build iOS and upload to TestFlight from current branch"

orbs:
  continuation: circleci/continuation@2

jobs:
  check-runner:
    docker:
      - image: cimg/base:current
    resource_class: small
    steps:
      - checkout
      - run:
          name: Check self-hosted runner availability
          command: |
            # For manual promote or testflight, skip runner check — those workflows
            # don't use the runner. Only pass use_self_hosted to avoid re-passing
            # trigger parameters which causes "Conflicting pipeline parameters".
            if [ "<< pipeline.parameters.run_manual_promote >>" = "true" ] || [ "<< pipeline.parameters.build_testflight >>" = "true" ]; then
              echo "Manual promote or testflight trigger — skipping runner check"
              echo "{\"use_self_hosted\": false}" > /tmp/pipeline-params.json
              cat /tmp/pipeline-params.json
              exit 0
            fi

            # Query CircleCI runner API to see if our self-hosted runner is online
            # Uses CIRCLE_TOKEN (project env var — personal API token) for runner API auth
            RUNNER_AVAILABLE=false

            if [ -n "$CIRCLE_TOKEN" ]; then
              echo "Checking for online runners in freegle/circleci-docker-runner..."
              RESPONSE=$(curl -sf --retry 2 --retry-delay 3 \
                -H "Circle-Token: ${CIRCLE_TOKEN}" \
                "https://runner.circleci.com/api/v3/runner?resource-class=freegle/circleci-docker-runner" 2>/dev/null) || true

              if [ -n "$RESPONSE" ]; then
                ONLINE_COUNT=$(echo "$RESPONSE" | jq '[.items[] | select(.resource_class=="freegle/circleci-docker-runner")] | length' 2>/dev/null) || ONLINE_COUNT=0
                echo "Found ${ONLINE_COUNT} runner(s)"
                if [ "$ONLINE_COUNT" -gt "0" ]; then
                  RUNNER_AVAILABLE=true
                fi
              else
                echo "Runner API check failed or returned empty response — falling back to cloud"
              fi
            else
              echo "CIRCLE_TOKEN not set — falling back to cloud"
            fi

            echo "Runner available: ${RUNNER_AVAILABLE}"
            echo "{\"use_self_hosted\": ${RUNNER_AVAILABLE}}" > /tmp/pipeline-params.json
            cat /tmp/pipeline-params.json
      - continuation/continue:
          configuration_path: .circleci/continue-config.yml
          parameters: /tmp/pipeline-params.json

workflows:
  setup:
    jobs:
      - check-runner
