# ModTools Netlify configuration
# This file is used by the dedicated ModTools Netlify site
# Both Freegle and ModTools deploy from the production branch
# Base directory is iznik-nuxt3/modtools — paths are relative to that

[build.environment]
NODE_VERSION = "22"
NPM_FLAGS = "--legacy-peer-deps"

[build]
command = "cd .. && npm install --legacy-peer-deps && npx nuxi prepare && cd modtools && npm install --legacy-peer-deps && npm run build"
publish = "dist"

# Return 404 for requests from old code. This avoids the function call, which costs.
[[redirects]]
from = "/api/*"
to = "/"
status = 404
force = true

[[redirects]]
from = "/sw.js*"
to = "/"
status = 404
force = true

[[redirects]]
from = "/gimg*"
to = "/"
status = 404
force = true

[[redirects]]
from = "/uimg*"
to = "/"
status = 404
force = true
