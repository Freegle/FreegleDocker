version: 2.1

description: |
  Shared commands and jobs for Freegle testing and app builds.
  Used by FreegleDocker (monorepo with inline subtrees for iznik-server, iznik-server-go, iznik-nuxt3).

executors:
  machine-executor:
    machine:
      image: ubuntu-2404:current
      docker_layer_caching: true
    resource_class: large
    environment:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
      COMPOSE_PROFILES: frontend,database,backend,dev,monitoring
      COMPOSE_PROJECT_NAME: freegle
      PW_WORKERS: 5

  machine-executor-local:
    machine:
      image: ubuntu-2404:current
    resource_class: freegle/circleci-docker-runner
    environment:
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
      COMPOSE_PROFILES: frontend,database,backend,dev,monitoring
      COMPOSE_PROJECT_NAME: freegle-ci
      SELF_HOSTED_RUNNER: "true"
      # Port offsets (+9000) to avoid conflicts with any local dev stack
      PORT_TRAEFIK_HTTP: 9080
      PORT_TRAEFIK_API: 17192
      PORT_TRAEFIK_DASHBOARD: 17080
      PORT_PHPMYADMIN: 17086
      PORT_MAILPIT_WEB: 17025
      PORT_MAILPIT_SMTP: 10025
      PORT_SPAMASSASSIN: 9783
      PORT_RSPAMD: 20334
      PORT_TUSD: 10080
      PORT_STATUS: 17081
      PORT_AI_SUPPORT: 17083
      PORT_APIV1_SSH: 10023
      PORT_APIV1_HTTP: 9083
      PORT_APIV1_HTTP2: 17181
      PORT_APIV2: 17193
      PORT_APIV2_LIVE: 17194
      PORT_FREEGLE_DEV_LOCAL: 12002
      PORT_FREEGLE_DEV_LIVE: 12005
      PORT_FREEGLE_PROD_LOCAL: 12012
      PORT_MODTOOLS_DEV_LOCAL: 12003
      PORT_MODTOOLS_DEV_LIVE: 12006
      PORT_MODTOOLS_PROD_LOCAL: 12013
      PORT_LOKI: 12100
      PORT_POSTFIX_SMTP: 9025
      PORT_MCP_SANITIZER: 17084

  android-executor:
    docker:
      - image: cimg/android:2025.10-node
    resource_class: large

  macos-executor:
    macos:
      xcode: 26.2.0
    resource_class: m4pro.medium

commands:
  # === Setup Commands ===

  setup-dependencies:
    description: "Install system dependencies and docker-compose"
    steps:
      - run:
          name: Kill stale apt processes
          command: |
            if [ "$SELF_HOSTED_RUNNER" = "true" ]; then
              echo "Self-hosted runner — skipping apt cleanup (not needed)"
              exit 0
            fi
            # Kill any stale unattended-upgrade processes that may block apt
            sudo pkill -9 unattended-upgrade 2>/dev/null || true
            sudo pkill -9 apt 2>/dev/null || true
            sudo pkill -9 dpkg 2>/dev/null || true
            # Remove stale apt locks
            sudo rm -f /var/lib/apt/lists/lock 2>/dev/null || true
            sudo rm -f /var/lib/dpkg/lock* 2>/dev/null || true
            sudo rm -f /var/cache/apt/archives/lock 2>/dev/null || true
            # Reconfigure dpkg if interrupted
            sudo dpkg --configure -a 2>/dev/null || true
            echo "Cleaned up stale apt processes and locks"
      - run:
          name: Install system dependencies
          command: |
            if [ "$SELF_HOSTED_RUNNER" = "true" ]; then
              echo "Self-hosted runner — verifying pre-installed dependencies"
              docker --version
              docker-compose --version || docker compose version
              jq --version
              curl --version | head -1
              echo "Current memory:"
              free -h
              exit 0
            fi

            # Try to create swap file - may fail on self-hosted runners (that's OK)
            echo "Attempting swap file creation..."
            if sudo fallocate -l 8G /swapfile 2>/dev/null && \
               sudo chmod 600 /swapfile && \
               sudo mkswap /swapfile 2>/dev/null && \
               sudo swapon /swapfile 2>/dev/null; then
              echo "Swap enabled:"
              free -h
            else
              echo "Swap creation skipped (self-hosted runner or insufficient permissions)"
              echo "Current memory:"
              free -h
            fi

            sudo apt-get update
            sudo apt-get install -y curl jq file

            # Install latest stable docker-compose with retry and validation
            COMPOSE_VERSION=$(curl -sf --retry 3 --retry-delay 5 https://api.github.com/repos/docker/compose/releases/latest | jq -r '.tag_name')
            if [ -z "$COMPOSE_VERSION" ] || [ "$COMPOSE_VERSION" = "null" ]; then
              echo "Failed to get docker-compose version from API, using fallback"
              COMPOSE_VERSION="v2.32.4"
            fi
            echo "Installing docker-compose ${COMPOSE_VERSION}"

            # Download with -f to fail on HTTP errors, retry on transient failures
            for attempt in 1 2 3; do
              echo "Download attempt $attempt..."
              if sudo curl -fL --retry 3 --retry-delay 10 \
                "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-$(uname -s)-$(uname -m)" \
                -o /usr/local/bin/docker-compose; then

                # Validate it's a binary, not an HTML error page
                if file /usr/local/bin/docker-compose | grep -q "ELF"; then
                  echo "docker-compose downloaded and validated successfully"
                  break
                else
                  echo "Downloaded file is not a valid binary:"
                  file /usr/local/bin/docker-compose
                  head -5 /usr/local/bin/docker-compose
                  sudo rm -f /usr/local/bin/docker-compose
                fi
              fi

              if [ $attempt -lt 3 ]; then
                echo "Download failed, waiting 30s before retry..."
                sleep 30
              fi
            done

            if [ ! -f /usr/local/bin/docker-compose ] || ! file /usr/local/bin/docker-compose | grep -q "ELF"; then
              echo "ERROR: Failed to download valid docker-compose binary after 3 attempts"
              exit 1
            fi

            sudo chmod +x /usr/local/bin/docker-compose
            docker-compose --version
          max_auto_reruns: 3
          auto_rerun_delay: 10s
      - run:
          name: Start resource monitor
          background: true
          command: |
            echo "Resource monitor started - logging every 30 seconds"
            while true; do
              echo ""
              echo "========================================"
              echo "RESOURCE CHECK: $(date '+%Y-%m-%d %H:%M:%S')"
              echo "========================================"
              echo "--- Memory ---"
              free -h
              echo "--- Swap Usage ---"
              swapon --show
              echo "--- CPU Load ---"
              uptime
              echo "--- Disk I/O (iowait% shows disk bottleneck) ---"
              iostat -x 1 2 | tail -n +3
              echo "--- Top 5 Memory Consumers ---"
              ps aux --sort=-%mem | head -6
              echo "--- Docker Stats ---"
              docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}" 2>/dev/null || echo "No containers running"
              sleep 30
            done

  start-docker-services:
    description: "Start Docker Compose services with proper setup"
    parameters:
      reason:
        type: string
        default: "Starting Docker services"
    steps:
      - run:
          name: Start Docker services
          max_auto_reruns: 3
          auto_rerun_delay: 10s
          command: |
            echo "<< parameters.reason >>"

            # Ensure COMPOSE_PROFILES is set for all docker-compose commands
            export COMPOSE_PROFILES="${COMPOSE_PROFILES:-frontend,database,backend,dev,monitoring}"

            # Clean up any existing containers first
            docker-compose down --remove-orphans || true
            # On self-hosted runner, also clean up containers from old CI runs that used
            # COMPOSE_PROJECT_NAME=freegle (before we switched to freegle-ci)
            if [ "${SELF_HOSTED_RUNNER:-}" = "true" ]; then
              old_containers=$(docker ps -aq --filter "label=com.docker.compose.project=freegle" --filter "label=com.docker.compose.project.working_dir=/home/circleci/workdir" 2>/dev/null)
              if [ -n "$old_containers" ]; then
                echo "Cleaning up old CI containers (project=freegle, workdir=/home/circleci/workdir)..."
                docker stop $old_containers 2>/dev/null || true
                docker rm $old_containers 2>/dev/null || true
              fi
            fi
            # Only prune on cloud — self-hosted runner needs layer cache for fast builds
            if [ "${SELF_HOSTED_RUNNER:-}" != "true" ]; then
              docker system prune -f || true
            fi

            # Fix memory overcommit for Redis
            sudo sysctl vm.overcommit_memory=1
            echo "Set vm.overcommit_memory=1 for Redis"

            # Create secrets files after cleanup, right before Docker startup
            echo "Creating secrets files after cleanup:"
            mkdir -p secrets
            echo "placeholder" > secrets/lovejunk-api.txt
            echo "placeholder" > secrets/lovejunk-secret.txt
            echo "placeholder" > secrets/partner-key.txt
            echo "placeholder" > secrets/partner-name.txt
            echo "placeholder" > secrets/image-domain.txt
            echo "Current working directory: $(pwd)"
            ls -la secrets/

      - run:
          name: Build containers
          command: |
            # Pre-pull base image once (avoids multiple registry checks during parallel builds)
            echo "Pre-pulling base image..."
            docker pull ghcr.io/freegle/freegle-base:latest

            # Build only containers needed for CI tests (skip dev containers)
            # This saves ~2-3 minutes by not building dev-local, modtools-dev-local, ai-support-helper
            echo "Building CI-required containers..."

            # Retry logic for transient network errors (ECONNRESET, etc.) during npm install
            MAX_RETRIES=3
            RETRY_DELAY=30

            for attempt in $(seq 1 $MAX_RETRIES); do
              echo "Build attempt $attempt of $MAX_RETRIES..."

              # Self-hosted runner has persistent Docker layer cache — use it
              CACHE_FLAG="--no-cache"
              if [ "${SELF_HOSTED_RUNNER:-}" = "true" ]; then
                CACHE_FLAG=""
                echo "Self-hosted runner: using Docker layer cache"
              fi

              if docker-compose build $CACHE_FLAG \
                apiv1 apiv1-phpunit apiv2 \
                freegle-prod-local modtools-prod-local \
                playwright status batch; then
                echo "✅ Build succeeded on attempt $attempt"
                break
              else
                if [ $attempt -lt $MAX_RETRIES ]; then
                  echo "⚠️ Build failed on attempt $attempt, retrying in ${RETRY_DELAY}s..."
                  # Clean up any partial builds
                  docker-compose down --remove-orphans 2>/dev/null || true
                  docker system prune -f 2>/dev/null || true
                  sleep $RETRY_DELAY
                else
                  echo "❌ Build failed after $MAX_RETRIES attempts"
                  exit 1
                fi
              fi
            done

            # Two-phase startup: databases must exist before application containers start.
            #
            # Phase 1: Start infrastructure + batch (runs Laravel migrations to create iznik DB)
            # Then run setup-test-database.sh to clone iznik → iznik_phpunit_test, iznik_go_test
            #
            # Phase 2: Start all remaining containers (all databases already exist)

            echo "=== Phase 1: Starting infrastructure + batch for migrations ==="
            docker-compose up -d \
              percona postgres redis beanstalkd mailpit \
              spamassassin-app reverse-proxy tusd delivery loki mjml \
              batch status host-scripts

            echo "Waiting for percona to be healthy..."
            for i in $(seq 1 60); do
              health=$(docker inspect --format='{{.State.Health.Status}}' ${COMPOSE_PROJECT_NAME:-freegle}-percona 2>/dev/null || echo "unknown")
              if [ "$health" = "healthy" ]; then
                echo "✅ Percona is healthy"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "❌ Percona did not become healthy within 2 minutes"
                docker logs ${COMPOSE_PROJECT_NAME:-freegle}-percona --tail 20 2>&1 || true
                exit 1
              fi
              sleep 2
            done

            echo "Waiting for batch container to be healthy (running migrations)..."
            for i in $(seq 1 120); do
              health=$(docker inspect --format='{{.State.Health.Status}}' ${COMPOSE_PROJECT_NAME:-freegle}-batch 2>/dev/null || echo "unknown")
              if [ "$health" = "healthy" ]; then
                echo "✅ Batch is healthy (migrations complete)"
                break
              fi
              if [ "$i" -eq 120 ]; then
                echo "❌ Batch did not become healthy within 4 minutes"
                docker logs ${COMPOSE_PROJECT_NAME:-freegle}-batch --tail 30 2>&1 || true
                exit 1
              fi
              sleep 2
            done

            echo "=== Creating test databases (before application containers start) ==="
            # Find and run setup-test-database.sh
            if [ -f "./scripts/setup-test-database.sh" ]; then
              bash "./scripts/setup-test-database.sh"
            elif [ -f "$HOME/FreegleDocker/scripts/setup-test-database.sh" ]; then
              bash "$HOME/FreegleDocker/scripts/setup-test-database.sh"
            elif [ -f "$HOME/project/scripts/setup-test-database.sh" ]; then
              bash "$HOME/project/scripts/setup-test-database.sh"
            else
              echo "❌ setup-test-database.sh not found!"
              echo "CWD: $(pwd)"
              echo "HOME: $HOME"
              ls -la scripts/ 2>/dev/null || echo "No scripts/ directory in CWD"
              exit 1
            fi

            echo "=== Phase 2: Starting all remaining containers ==="
            docker-compose up -d

            echo "Waiting for application services to start..."
            sleep 30

            echo "Service status:"
            docker-compose ps

            # Verify expected container names exist (fail fast if container_name isn't working)
            echo ""
            echo "=== Verifying container names ==="
            # Containers needed for CI tests (dev containers excluded as they're not used in tests)
            ALL_CONTAINERS="${COMPOSE_PROJECT_NAME:-freegle}-traefik ${COMPOSE_PROJECT_NAME:-freegle}-percona ${COMPOSE_PROJECT_NAME:-freegle}-postgres ${COMPOSE_PROJECT_NAME:-freegle}-phpmyadmin ${COMPOSE_PROJECT_NAME:-freegle}-mailpit ${COMPOSE_PROJECT_NAME:-freegle}-beanstalkd ${COMPOSE_PROJECT_NAME:-freegle}-spamassassin ${COMPOSE_PROJECT_NAME:-freegle}-redis ${COMPOSE_PROJECT_NAME:-freegle}-delivery ${COMPOSE_PROJECT_NAME:-freegle}-tusd ${COMPOSE_PROJECT_NAME:-freegle}-status ${COMPOSE_PROJECT_NAME:-freegle}-host-scripts ${COMPOSE_PROJECT_NAME:-freegle}-apiv1 ${COMPOSE_PROJECT_NAME:-freegle}-apiv1-phpunit ${COMPOSE_PROJECT_NAME:-freegle}-apiv2 ${COMPOSE_PROJECT_NAME:-freegle}-batch ${COMPOSE_PROJECT_NAME:-freegle}-prod-local ${COMPOSE_PROJECT_NAME:-freegle}-modtools-prod-local ${COMPOSE_PROJECT_NAME:-freegle}-playwright"
            MISSING=""
            for container in $ALL_CONTAINERS; do
              if docker inspect "$container" >/dev/null 2>&1; then
                echo "✅ $container"
              else
                echo "❌ $container NOT FOUND"
                MISSING="$MISSING $container"
              fi
            done

            if [ -n "$MISSING" ]; then
              echo ""
              echo "ERROR: Containers missing:$MISSING"
              echo "This usually means container_name directives in docker-compose.yml are not working."
              echo ""
              echo "Actual running containers:"
              docker ps --format "table {{.Names}}\t{{.Status}}"
              exit 1
            fi
            echo ""
            echo "✅ All containers verified"

  # === Removed Commands (monorepo migration) ===
  # clone-freegle-docker: Removed — no longer needed; monorepo checkout replaces submodule cloning
  # replace-submodule: Removed — subtrees are inline; no submodule swapping needed
  # align-submodule-branches: Removed — single repo; branch alignment is implicit
  # rebuild-aligned-containers: Removed — no cross-repo branch alignment needed
  # build-submodule-container: Removed — containers built from monorepo checkout

  start-services:
    description: "Create secrets and start Docker services"
    steps:
      - run:
          name: Create secrets files
          command: |
            cd "$HOME/FreegleDocker"
            mkdir -p secrets
            echo "placeholder" > secrets/lovejunk-api.txt
            echo "placeholder" > secrets/lovejunk-secret.txt
            echo "placeholder" > secrets/partner-key.txt
            echo "placeholder" > secrets/partner-name.txt
            echo "placeholder" > secrets/image-domain.txt
      - run:
          name: Fix memory overcommit for Redis
          command: sudo sysctl vm.overcommit_memory=1 || true
      - run:
          name: Start Docker services (two-phase)
          command: |
            cd "$HOME/FreegleDocker"

            # Ensure COMPOSE_PROFILES is set (may not be in .env if profiles branch not merged yet)
            export COMPOSE_PROFILES="${COMPOSE_PROFILES:-frontend,database,backend,dev,monitoring}"

            # Two-phase startup: all databases must exist before application containers start.
            #
            # Phase 1: Infrastructure + batch (migrations create iznik DB)
            #          Then setup-test-database.sh clones iznik → test databases
            # Phase 2: All remaining containers (databases already waiting for them)

            echo "=== Phase 1: Infrastructure + migrations ==="
            docker-compose up -d \
              percona postgres redis beanstalkd mailpit \
              spamassassin-app reverse-proxy tusd delivery loki mjml \
              batch status host-scripts

            echo "Waiting for percona to be healthy..."
            for i in $(seq 1 60); do
              health=$(docker inspect --format='{{.State.Health.Status}}' ${COMPOSE_PROJECT_NAME:-freegle}-percona 2>/dev/null || echo "unknown")
              if [ "$health" = "healthy" ]; then
                echo "✅ Percona is healthy"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "❌ Percona did not become healthy within 2 minutes"
                docker logs ${COMPOSE_PROJECT_NAME:-freegle}-percona --tail 20 2>&1 || true
                exit 1
              fi
              sleep 2
            done

            echo "Waiting for batch container to be healthy (migrations)..."
            for i in $(seq 1 120); do
              health=$(docker inspect --format='{{.State.Health.Status}}' ${COMPOSE_PROJECT_NAME:-freegle}-batch 2>/dev/null || echo "unknown")
              if [ "$health" = "healthy" ]; then
                echo "✅ Batch is healthy (migrations complete)"
                break
              fi
              if [ "$i" -eq 120 ]; then
                echo "❌ Batch did not become healthy within 4 minutes"
                docker logs ${COMPOSE_PROJECT_NAME:-freegle}-batch --tail 30 2>&1 || true
                exit 1
              fi
              sleep 2
            done

            echo "=== Creating test databases ==="
            if [ -f "./scripts/setup-test-database.sh" ]; then
              bash "./scripts/setup-test-database.sh"
            elif [ -f "$HOME/FreegleDocker/scripts/setup-test-database.sh" ]; then
              bash "$HOME/FreegleDocker/scripts/setup-test-database.sh"
            elif [ -f "$HOME/project/scripts/setup-test-database.sh" ]; then
              bash "$HOME/project/scripts/setup-test-database.sh"
            else
              echo "❌ setup-test-database.sh not found!"
              echo "CWD: $(pwd)"
              exit 1
            fi

            echo "=== Phase 2: Starting all remaining containers ==="
            docker-compose up -d

            echo "Waiting for application services to start..."
            sleep 30
            echo "Service status:"
            docker-compose ps

  wait-for-basic-services:
    description: "Wait for API v1 and v2 services to be healthy"
    steps:
      - run:
          name: Wait for API services to be ready
          command: |
            # Support both FreegleDocker main build (~/project) and submodule tests (~/FreegleDocker)
            if [ -d "$HOME/FreegleDocker" ]; then
              cd "$HOME/FreegleDocker"
            fi
            echo "Waiting for API v1 and v2 services to be healthy..."

            start_time=$(date +%s)
            timeout_duration=600  # 10 minutes for basic services

            while true; do
              current_time=$(date +%s)
              elapsed=$((current_time - start_time))

              if [ $elapsed -gt $timeout_duration ]; then
                echo "❌ Timeout waiting for API services after 10 minutes"
                echo ""
                echo "=== Final status API response ==="
                curl -s http://localhost:${PORT_STATUS:-8081}/api/status/all 2>/dev/null | jq . || echo "(status service not responding)"
                echo ""
                echo "=== Docker container health ==="
                docker ps --format 'table {{.Names}}\t{{.Status}}' 2>/dev/null || true
                echo ""
                echo "=== Status container logs (last 30) ==="
                docker logs ${COMPOSE_PROJECT_NAME:-freegle}-status --tail 30 2>&1 || true
                echo ""
                echo "=== API v1 container logs (last 30) ==="
                docker logs ${COMPOSE_PROJECT_NAME:-freegle}-apiv1-phpunit --tail 30 2>&1 || true
                echo ""
                echo "=== API v2 container logs (last 30) ==="
                docker logs ${COMPOSE_PROJECT_NAME:-freegle}-apiv2 --tail 30 2>&1 || true
                echo ""
                echo "=== Batch container logs (last 30) ==="
                docker logs ${COMPOSE_PROJECT_NAME:-freegle}-batch --tail 30 2>&1 || true
                exit 1
              fi

              # Check if status service is responding
              if curl -f -s http://localhost:${PORT_STATUS:-8081} > /dev/null 2>&1; then
                echo "✅ Status service is responding!"

                # Get health status from status service
                health_response=$(curl -s http://localhost:${PORT_STATUS:-8081}/api/status/all 2>/dev/null || echo '{}')

                # Check if API v1 and v2 are healthy
                apiv1_status=$(echo "$health_response" | jq -r '.apiv1.status // "unknown"')
                apiv2_status=$(echo "$health_response" | jq -r '.apiv2.status // "unknown"')

                if [ "$apiv1_status" = "success" ] && [ "$apiv2_status" = "success" ]; then
                  echo "✅ API v1 and v2 services are healthy!"
                  break
                else
                  elapsed_min=$((elapsed / 60))
                  echo "[${elapsed_min}m] API v1: $apiv1_status, API v2: $apiv2_status - waiting..."
                fi
              else
                echo "Status service not yet responding..."
              fi

              sleep 10
            done

            echo "🎉 API services are ready!"
          no_output_timeout: 15m

  wait-for-prod-container:
    description: "Wait for production containers to be healthy"
    steps:
      - run:
          name: Wait for production containers to be healthy
          command: |
            # Support both FreegleDocker main build (~/project) and submodule tests (~/FreegleDocker)
            if [ -d "$HOME/FreegleDocker" ]; then
              cd "$HOME/FreegleDocker"
            fi
            echo "⏳ Waiting for production containers to be healthy..."
            start_time=$(date +%s)
            timeout_duration=1200  # 20 minutes

            # Track if containers are actually responding (not just Docker status)
            freegle_http_ready=false
            modtools_http_ready=false

            while true; do
              current_time=$(date +%s)
              elapsed=$((current_time - start_time))

              if [ $elapsed -gt $timeout_duration ]; then
                echo "❌ Timeout waiting for production containers after 20 minutes"
                echo "Freegle HTTP ready: $freegle_http_ready"
                echo "ModTools HTTP ready: $modtools_http_ready"
                echo ""
                echo "=== Freegle container logs ==="
                docker logs ${COMPOSE_PROJECT_NAME:-freegle}-prod-local --tail 50 2>&1 || true
                echo ""
                echo "=== ModTools container logs ==="
                docker logs ${COMPOSE_PROJECT_NAME:-freegle}-modtools-prod-local --tail 50 2>&1 || true
                exit 1
              fi

              # Check Docker status first (to see if containers are running)
              health_response=$(curl -s http://localhost:${PORT_STATUS:-8081}/api/status/all 2>/dev/null || echo '{}')
              freegle_prod_status=$(echo "$health_response" | jq -r ".\"${COMPOSE_PROJECT_NAME:-freegle}-prod-local\".status // \"unknown\"")
              modtools_prod_status=$(echo "$health_response" | jq -r ".\"${COMPOSE_PROJECT_NAME:-freegle}-modtools-prod-local\".status // \"unknown\"")

              # Also make actual HTTP requests to verify servers are responding
              # This is needed because Docker status is "running" during npm build
              if [ "$freegle_http_ready" = "false" ]; then
                if curl -s -f -o /dev/null --max-time 5 http://localhost:3012/ 2>/dev/null; then
                  freegle_http_ready=true
                  echo "✅ Freegle production container is responding on HTTP"
                fi
              fi

              if [ "$modtools_http_ready" = "false" ]; then
                if curl -s -f -o /dev/null --max-time 5 http://localhost:3013/ 2>/dev/null; then
                  modtools_http_ready=true
                  echo "✅ ModTools production container is responding on HTTP"
                fi
              fi

              # Both must be running AND responding to HTTP
              if [ "$freegle_http_ready" = "true" ] && [ "$modtools_http_ready" = "true" ]; then
                echo "✅ Both production containers are healthy and responding!"
                break
              else
                elapsed_min=$((elapsed / 60))
                echo "[${elapsed_min}m] Docker: FD=$freegle_prod_status MT=$modtools_prod_status | HTTP: FD=$freegle_http_ready MT=$modtools_http_ready - waiting..."

                # Show container logs periodically to track build progress
                if [ $((elapsed % 60)) -lt 15 ]; then
                  echo "--- FD Production container recent output ---"
                  docker logs ${COMPOSE_PROJECT_NAME:-freegle}-prod-local --tail 3 2>&1 || true
                fi

                sleep 15
              fi
            done
          no_output_timeout: 25m

  # === Test Execution Commands ===

  run-go-tests:
    description: "Run Go tests via the status service API and upload coverage"
    parameters:
      reason:
        type: string
        default: "Running Go tests"
    steps:
      - run:
          name: Run Go tests and upload coverage
          command: |
            if [ "$SKIP_GO" = "true" ]; then
              echo "Skipping Go tests — no changes in iznik-server-go/"
              exit 0
            fi
            # Support both FreegleDocker (~/project) and submodule (~/FreegleDocker) paths
            if [ -d "$HOME/FreegleDocker" ]; then
              cd "$HOME/FreegleDocker"
            fi
            echo "🧪 << parameters.reason >>..."

            # Trigger tests via API with coverage enabled
            response=$(curl -s -w "%{http_code}" -X POST -H "Content-Type: application/json" "http://localhost:${PORT_STATUS:-8081}/api/tests/go?coverage=true")
            http_code="${response: -3}"

            if [ "$http_code" -ne "200" ]; then
              echo "❌ Failed to trigger Go tests. HTTP code: $http_code"
              echo "Response: $response"
              exit 1
            fi

            echo "✅ Go tests triggered successfully"

            # Monitor test progress with timeout
            echo "📊 Monitoring Go test progress..."
            start_time=$(date +%s)
            timeout_duration=2100  # 35 minutes

            while true; do
              current_time=$(date +%s)
              elapsed=$((current_time - start_time))

              if [ $elapsed -gt $timeout_duration ]; then
                echo "❌ Go tests timed out after 35 minutes"
                exit 1
              fi

              sleep 5
              status_response=$(curl -s http://localhost:${PORT_STATUS:-8081}/api/tests/go/status || echo '{"status":"error"}')
              status=$(echo "$status_response" | jq -r '.status // "unknown"')
              message=$(echo "$status_response" | jq -r '.message // "No message"')
              passed=$(echo "$status_response" | jq -r '.progress.passed // 0')
              failed=$(echo "$status_response" | jq -r '.progress.failed // 0')

              elapsed_min=$((elapsed / 60))
              echo "[${elapsed_min}m] Status: $status | ${passed}✓ ${failed}✗ | $message"

              if [ "$status" = "completed" ]; then
                echo "🎉 Go tests completed!"
                echo "✅ Go tests passed!"
                echo "GO_TESTS_PASSED=true" >> $BASH_ENV
                break
              elif [ "$status" = "failed" ] || [ "$status" = "error" ]; then
                echo "❌ Go tests failed!"
                echo "Error details:"
                echo "$status_response" | jq -r '.logs // "No logs available"' | tail -50
                echo "GO_TESTS_PASSED=false" >> $BASH_ENV
                exit 1
              fi
            done

            # Upload Go coverage immediately after tests complete
            echo "📤 Uploading Go coverage..."
            if [ -z "${COVERALLS_REPO_TOKEN}" ]; then
              echo "⚠️ COVERALLS_REPO_TOKEN not set - skipping coverage upload"
              exit 0
            fi

            # Copy coverage file from container
            if docker cp ${COMPOSE_PROJECT_NAME:-freegle}-apiv2:/app/coverage.out iznik-server-go/coverage.out 2>/dev/null; then
              echo "✅ Found Go coverage file"

              # Install gcov2lcov
              go install github.com/jandelgado/gcov2lcov@latest || echo "gcov2lcov install warning"

              if command -v gcov2lcov > /dev/null; then
                cd iznik-server-go
                if gcov2lcov -infile=coverage.out -outfile=coverage.lcov 2>&1 && [ -s coverage.lcov ]; then
                  # Copy lcov to original checkout for coveralls (needs .git)
                  if [ -d ~/project/.git ]; then
                    cp coverage.lcov ~/project/
                    cd ~/project
                  else
                    cd ..
                  fi

                  # Check for Coveralls outage before uploading
                  OUTAGE_JSON=$(curl -sf --max-time 10 "https://status.coveralls.io/api/v2/incidents/unresolved.json" 2>/dev/null || echo '{}')
                  INCIDENT_COUNT=$(echo "$OUTAGE_JSON" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('incidents',[])))" 2>/dev/null || echo "0")
                  if [ "$INCIDENT_COUNT" -gt 0 ]; then
                    echo "⚠️ Coveralls has an active outage (see https://status.coveralls.io) - skipping upload"
                  else
                    npm install -g coveralls
                    export COVERALLS_SERVICE_NAME="circleci"
                    export COVERALLS_SERVICE_JOB_ID="${CIRCLE_BUILD_NUM}"
                    if cat coverage.lcov | coveralls; then
                      echo "✅ Go coverage uploaded successfully"
                    else
                      echo "❌ Go coverage upload failed"
                      exit 1
                    fi
                  fi
                else
                  echo "❌ Failed to convert Go coverage to lcov format"
                  exit 1
                fi
              else
                echo "❌ gcov2lcov not found"
                exit 1
              fi
            else
              echo "❌ Go coverage file not found"
              exit 1
            fi
          no_output_timeout: 40m

  run-php-tests:
    description: "Run PHPUnit tests via the status service API"
    parameters:
      reason:
        type: string
        default: "Running PHPUnit tests"
    steps:
      - restore_cache:
          keys:
            - geoip-db-v1
      - run:
          name: Run PHPUnit tests
          command: |
            # Support both FreegleDocker (~/project) and submodule (~/FreegleDocker) paths
            if [ -d "$HOME/FreegleDocker" ]; then
              cd "$HOME/FreegleDocker"
            fi
            echo "🐘 << parameters.reason >>..."

            # Restore GeoIP database from cache if available
            # Copy to the dedicated PHPUnit test container since that's where tests run
            if [ -f ~/geoip-cache/GeoLite2-Country.mmdb ]; then
              echo "📍 Restoring GeoIP database from cache..."
              docker exec ${COMPOSE_PROJECT_NAME:-freegle}-apiv1-phpunit mkdir -p /var/lib/GeoIP
              docker cp ~/geoip-cache/GeoLite2-Country.mmdb ${COMPOSE_PROJECT_NAME:-freegle}-apiv1-phpunit:/var/lib/GeoIP/GeoLite2-Country.mmdb
              docker cp ~/geoip-cache/GeoLite2-City.mmdb ${COMPOSE_PROJECT_NAME:-freegle}-apiv1-phpunit:/var/lib/GeoIP/GeoLite2-City.mmdb 2>/dev/null || true
              echo "✅ GeoIP database restored from cache"
            else
              echo "⚠️ No GeoIP cache found - container will attempt download"
              # Give container time to download GeoIP (it has retry logic)
              echo "Waiting for GeoIP download attempt..."
              sleep 30
            fi

            # Database schema set up by setup-test-database step (Laravel migrations)
            # Just verify the database is accessible
            echo "Verifying database connection..."
            docker exec ${COMPOSE_PROJECT_NAME:-freegle}-apiv1 sh -c "mysql -h percona -u root -piznik -e 'SELECT 1 FROM iznik.groups LIMIT 1'" || {
              echo "Database not ready after setup-test-database - this should not happen"
              echo "Check that ${COMPOSE_PROJECT_NAME:-freegle}-batch migrations ran successfully"
              docker logs ${COMPOSE_PROJECT_NAME:-freegle}-batch --tail 30 2>&1 || true
              exit 1
            }

            # Trigger tests via API
            response=$(curl -s -w "%{http_code}" -X POST -H "Content-Type: application/json" http://localhost:${PORT_STATUS:-8081}/api/tests/php)
            http_code="${response: -3}"

            if [ "$http_code" -ne "200" ]; then
              echo "❌ Failed to trigger PHP tests. HTTP code: $http_code"
              echo "Response: $response"
              exit 1
            fi

            echo "✅ PHP tests triggered successfully"

            # Monitor test progress with timeout
            echo "📊 Monitoring PHP test progress..."
            start_time=$(date +%s)
            timeout_duration=2700  # 45 minutes

            while true; do
              current_time=$(date +%s)
              elapsed=$((current_time - start_time))

              if [ $elapsed -gt $timeout_duration ]; then
                echo "❌ PHP tests timed out after 45 minutes"
                exit 1
              fi

              sleep 10
              status_response=$(curl -s http://localhost:${PORT_STATUS:-8081}/api/tests/php/status || echo '{"status":"error"}')
              status=$(echo "$status_response" | jq -r '.status // "unknown"')
              message=$(echo "$status_response" | jq -r '.message // "No message"')

              elapsed_min=$((elapsed / 60))
              echo "[${elapsed_min}m] Status: $status"
              echo "Message: $message"

              if [ "$status" = "completed" ]; then
                echo "🎉 PHP tests completed!"
                echo "✅ PHPUnit tests passed!"
                echo "PHP_TESTS_PASSED=true" >> $BASH_ENV
                break
              elif [ "$status" = "failed" ] || [ "$status" = "error" ]; then
                echo "❌ PHP tests failed!"
                echo "Error details:"
                echo "$status_response" | jq -r '.logs // "No logs available"' | tail -30

                # Show the failure details from the PHPUnit debug log
                echo ""
                echo "Extracting failure details from PHPUnit output..."
                # Use the dedicated PHPUnit test container (${COMPOSE_PROJECT_NAME:-freegle}-apiv1-phpunit)
                docker exec ${COMPOSE_PROJECT_NAME:-freegle}-apiv1-phpunit sh -c '
                  if [ -f /tmp/phpunit-debug.log ]; then
                    echo "=== TEST FAILURES ==="
                    grep "##teamcity\[testFailed" /tmp/phpunit-debug.log | head -10 | while read -r line; do
                      test_name=$(echo "$line" | sed "s/.*name='"'"'\([^'"'"']*\)'"'"'.*/\1/")
                      message=$(echo "$line" | sed "s/.*message='"'"'\([^'"'"']*\)'"'"'.*/\1/")
                      details=$(echo "$line" | sed "s/.*details='"'"'\([^'"'"']*\)'"'"'.*/\1/" | sed "s/|n/\n/g")
                      if [ -n "$test_name" ]; then
                        echo "❌ $test_name"
                        [ -n "$message" ] && echo "   Message: $message"
                        [ -n "$details" ] && echo "   Details: $details"
                      fi
                    done

                    echo ""
                    echo "=== TEST SUMMARY ==="
                    tail -20 /tmp/phpunit-debug.log | grep -E "Tests:|FAILURES!|Skipped:" || echo "No summary found"
                  else
                    echo "Debug log not found"
                  fi
                ' || echo "Could not extract failure details"

                echo "PHP_TESTS_PASSED=false" >> $BASH_ENV
                exit 1
              fi
            done

            # Upload PHP coverage immediately after tests complete
            echo "📤 Uploading PHP coverage..."
            if [ -z "${COVERALLS_REPO_TOKEN}" ]; then
              echo "⚠️ COVERALLS_REPO_TOKEN not set - skipping coverage upload"
              exit 0
            fi

            # Copy coverage file from container
            COVERAGE_FOUND=false
            if docker cp ${COMPOSE_PROJECT_NAME:-freegle}-apiv1-phpunit:/var/www/iznik/test/ut/php/clover.xml /tmp/phpunit-clover.xml 2>/dev/null; then
              COVERAGE_FOUND=true
              echo "✅ Found PHP coverage at /var/www/iznik/test/ut/php/clover.xml"
            elif docker cp ${COMPOSE_PROJECT_NAME:-freegle}-apiv1-phpunit:/tmp/phpunit-coverage.xml /tmp/phpunit-clover.xml 2>/dev/null; then
              COVERAGE_FOUND=true
              echo "✅ Found PHP coverage at /tmp/phpunit-coverage.xml"
            fi

            if [ "$COVERAGE_FOUND" = "true" ]; then
              # Check for Coveralls outage before uploading
              OUTAGE_JSON=$(curl -sf --max-time 10 "https://status.coveralls.io/api/v2/incidents/unresolved.json" 2>/dev/null || echo '{}')
              INCIDENT_COUNT=$(echo "$OUTAGE_JSON" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('incidents',[])))" 2>/dev/null || echo "0")
              if [ "$INCIDENT_COUNT" -gt 0 ]; then
                echo "⚠️ Coveralls has an active outage (see https://status.coveralls.io) - skipping upload"
              else
                npm install -g coveralls
                docker exec ${COMPOSE_PROJECT_NAME:-freegle}-apiv1 bash -c "cd /var/www/iznik && php composer.phar require php-coveralls/php-coveralls --dev" || echo "php-coveralls install warning"

                # Copy coverage file to container and upload
                docker cp /tmp/phpunit-clover.xml ${COMPOSE_PROJECT_NAME:-freegle}-apiv1:/var/www/iznik/clover.xml
                docker exec ${COMPOSE_PROJECT_NAME:-freegle}-apiv1 bash -c "cd /var/www/iznik && COVERALLS_REPO_TOKEN=${COVERALLS_REPO_TOKEN} COVERALLS_SERVICE_NAME=circleci COVERALLS_SERVICE_JOB_ID=${CIRCLE_BUILD_NUM} vendor/bin/php-coveralls -v --coverage_clover=clover.xml --json_path=/tmp/coveralls.json"

                if [ $? -eq 0 ]; then
                  echo "✅ PHP coverage uploaded successfully"
                else
                  echo "❌ PHP coverage upload failed"
                  exit 1
                fi
              fi
            else
              echo "❌ PHP coverage file not found"
              exit 1
            fi
          no_output_timeout: 50m
      - run:
          name: Save GeoIP database for caching
          when: always
          command: |
            # Copy GeoIP database from container for caching (if it exists)
            mkdir -p ~/geoip-cache
            docker cp ${COMPOSE_PROJECT_NAME:-freegle}-apiv1:/var/lib/GeoIP/GeoLite2-Country.mmdb ~/geoip-cache/GeoLite2-Country.mmdb 2>/dev/null && \
              echo "✅ GeoIP Country database saved for caching" || \
              echo "⚠️ GeoIP Country database not available to cache"
            docker cp ${COMPOSE_PROJECT_NAME:-freegle}-apiv1:/var/lib/GeoIP/GeoLite2-City.mmdb ~/geoip-cache/GeoLite2-City.mmdb 2>/dev/null && \
              echo "✅ GeoIP City database saved for caching" || \
              echo "⚠️ GeoIP City database not available to cache"
      - save_cache:
          key: geoip-db-v1
          paths:
            - ~/geoip-cache

  wait-for-batch-container:
    description: "Wait for batch container to be healthy and migrations to complete"
    steps:
      - run:
          name: Wait for batch container to be healthy
          command: |
            echo "⏳ Waiting for batch container to be healthy..."
            TIMEOUT=300
            ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' ${COMPOSE_PROJECT_NAME:-freegle}-batch 2>/dev/null || echo "not_found")
              RUNNING=$(docker inspect --format='{{.State.Running}}' ${COMPOSE_PROJECT_NAME:-freegle}-batch 2>/dev/null || echo "false")

              if [ "$STATUS" = "healthy" ]; then
                echo "✅ Batch container is healthy!"
                break
              elif [ "$RUNNING" = "false" ]; then
                echo "❌ Batch container is not running!"
                echo "Container logs:"
                docker logs ${COMPOSE_PROJECT_NAME:-freegle}-batch --tail 50 2>&1 || true
                exit 1
              fi

              echo "[$ELAPSED s] Batch container status: $STATUS (running: $RUNNING) - waiting..."
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done

            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "❌ Timeout waiting for batch container to be healthy"
              echo "Container logs:"
              docker logs ${COMPOSE_PROJECT_NAME:-freegle}-batch --tail 50 2>&1 || true
              exit 1
            fi

            # Verify migrations have completed by checking for ready marker file
            # The entrypoint creates /tmp/laravel-ready AFTER migrations complete
            echo "⏳ Verifying Laravel migrations are complete..."
            MIGRATION_TIMEOUT=120
            MIGRATION_ELAPSED=0
            while [ $MIGRATION_ELAPSED -lt $MIGRATION_TIMEOUT ]; do
              if docker exec ${COMPOSE_PROJECT_NAME:-freegle}-batch test -f /tmp/laravel-ready 2>/dev/null; then
                echo "✅ Laravel ready marker found - migrations complete"
                exit 0
              fi

              echo "[$MIGRATION_ELAPSED s] Waiting for /tmp/laravel-ready marker..."
              sleep 5
              MIGRATION_ELAPSED=$((MIGRATION_ELAPSED + 5))
            done

            echo "❌ Timeout waiting for migrations to complete"
            docker logs ${COMPOSE_PROJECT_NAME:-freegle}-batch --tail 30 2>&1 || true
            exit 1

  setup-test-database:
    description: "Set up test database schema and test environment"
    steps:
      - run:
          name: Set up test database and environment
          command: |
            # Find the script in either FreegleDocker clone or project checkout
            # Use bash explicitly to avoid permission issues on feature branches
            if [ -f "./scripts/setup-test-database.sh" ]; then
              bash "./scripts/setup-test-database.sh"
            elif [ -f "$HOME/FreegleDocker/scripts/setup-test-database.sh" ]; then
              bash "$HOME/FreegleDocker/scripts/setup-test-database.sh"
            elif [ -f "$HOME/project/scripts/setup-test-database.sh" ]; then
              bash "$HOME/project/scripts/setup-test-database.sh"
            else
              echo "❌ setup-test-database.sh not found!"
              echo "CWD: $(pwd)"
              exit 1
            fi

  run-vitest-tests:
    description: "Run Vitest unit tests for iznik-nuxt3 components"
    parameters:
      reason:
        type: string
        default: "Running Vitest unit tests"
    steps:
      - run:
          name: Install Node.js 22 for Vitest
          command: |
            if [ "$SKIP_VITEST" = "true" ]; then
              echo "Skipping Node.js install — Vitest tests skipped (no changes in iznik-nuxt3/)"
              exit 0
            fi
            echo "📦 Installing Node.js 22..."
            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
            sudo apt-get install -y nodejs
            echo "✅ Node.js $(node --version) installed"
      - run:
          name: Run Vitest unit tests
          command: |
            if [ "$SKIP_VITEST" = "true" ]; then
              echo "Skipping Vitest tests — no changes in iznik-nuxt3/"
              exit 0
            fi
            echo "🧪 << parameters.reason >>..."

            # Determine the iznik-nuxt3 directory
            if [ -d "./iznik-nuxt3" ]; then
              NUXT_DIR="./iznik-nuxt3"
            elif [ -d "$HOME/FreegleDocker/iznik-nuxt3" ]; then
              NUXT_DIR="$HOME/FreegleDocker/iznik-nuxt3"
            elif [ -d "$HOME/project/iznik-nuxt3" ]; then
              NUXT_DIR="$HOME/project/iznik-nuxt3"
            else
              echo "❌ Could not find iznik-nuxt3 directory"
              echo "CWD: $(pwd)"
              exit 1
            fi

            echo "📂 Using iznik-nuxt3 at: $NUXT_DIR"
            cd "$NUXT_DIR"

            # Check if vitest is configured
            if ! grep -q '"test:unit:run"' package.json; then
              echo "⚠️ Vitest not configured in package.json, skipping unit tests"
              exit 0
            fi

            # Install dependencies (using npm ci for faster, deterministic installs)
            echo "📦 Installing npm dependencies..."
            npm ci --prefer-offline --no-audit

            # Generate .nuxt directory (required for tsconfig.json extends)
            echo "🔧 Running nuxi prepare..."
            npx nuxi prepare

            # Run vitest
            echo "🧪 Running Vitest unit tests..."
            npm run test:unit:run -- --reporter=verbose --coverage 2>&1 | tee /tmp/vitest-output.log
            VITEST_EXIT_CODE=${PIPESTATUS[0]}

            if [ $VITEST_EXIT_CODE -eq 0 ]; then
              echo "✅ Vitest unit tests passed!"
            else
              echo "❌ Vitest unit tests failed with exit code: $VITEST_EXIT_CODE"
              exit $VITEST_EXIT_CODE
            fi

  run-playwright-tests:
    description: "Run Playwright tests via the status service API and upload coverage"
    parameters:
      reason:
        type: string
        default: "Running Playwright tests"
    steps:
      - run:
          name: Run Playwright tests and upload coverage
          command: |
            if [ "$SKIP_PLAYWRIGHT" = "true" ]; then
              echo "Skipping Playwright tests — no changes in iznik-nuxt3/"
              exit 0
            fi
            # Support both FreegleDocker (~/project) and submodule (~/FreegleDocker) paths
            if [ -d "$HOME/FreegleDocker" ]; then
              cd "$HOME/FreegleDocker"
            fi
            echo "🎭 << parameters.reason >>..."

            # Trigger tests via API
            response=$(curl -s -w "%{http_code}" -X POST -H "Content-Type: application/json" http://localhost:${PORT_STATUS:-8081}/api/tests/playwright)
            http_code="${response: -3}"

            if [ "$http_code" -ne "200" ]; then
              echo "❌ Failed to trigger Playwright tests. HTTP code: $http_code"
              echo "Response: $response"
              exit 1
            fi

            echo "✅ Playwright tests triggered successfully"

            # Monitor test progress with timeout
            echo "📊 Monitoring Playwright test progress..."
            start_time=$(date +%s)
            timeout_duration=2700  # 45 minutes

            while true; do
              current_time=$(date +%s)
              elapsed=$((current_time - start_time))

              if [ $elapsed -gt $timeout_duration ]; then
                echo "⏰ Playwright tests timed out after 45 minutes"
                exit 1
              fi

              sleep 10

              status_response=$(curl -s http://localhost:${PORT_STATUS:-8081}/api/tests/playwright/status || echo '{"status":"error"}')
              status=$(echo "$status_response" | jq -r '.status // "unknown"')
              message=$(echo "$status_response" | jq -r '.message // "No message"')
              completed=$(echo "$status_response" | jq -r '.progress.completed // 0')
              total=$(echo "$status_response" | jq -r '.progress.total // 0')

              elapsed_min=$((elapsed / 60))
              echo "[${elapsed_min}m] Status: $status, Progress: $completed/$total tests"
              echo "Message: $message"

              if [ "$status" = "completed" ]; then
                success=$(echo "$status_response" | jq -r '.success // false')
                echo "🎉 Playwright tests completed! Success: $success"

                if [ "$success" = "true" ]; then
                  echo "✅ All Playwright tests passed!"
                  echo "PLAYWRIGHT_TESTS_PASSED=true" >> $BASH_ENV
                  break
                else
                  echo "❌ Some Playwright tests failed!"
                  echo "Test logs:"
                  echo "$status_response" | jq -r '.logs // "No logs available"' | tail -30
                  echo "PLAYWRIGHT_TESTS_PASSED=false" >> $BASH_ENV
                  exit 1
                fi
              elif [ "$status" = "failed" ] || [ "$status" = "error" ]; then
                echo "❌ Playwright tests failed to run!"
                echo "Error details:"
                echo "$status_response" | jq -r '.logs // "No logs available"' | tail -30
                echo "PLAYWRIGHT_TESTS_PASSED=false" >> $BASH_ENV
                exit 1
              fi
            done

            # Upload Playwright coverage immediately after tests complete
            echo "📤 Uploading Playwright coverage..."
            if [ -z "${COVERALLS_REPO_TOKEN}" ]; then
              echo "⚠️ COVERALLS_REPO_TOKEN not set - skipping coverage upload"
              exit 0
            fi

            # Copy coverage file from playwright container (check multiple paths)
            LCOV_PATH=""
            if docker cp ${COMPOSE_PROJECT_NAME:-freegle}-playwright:/app/monocart-report/coverage/lcov.info /tmp/playwright-coverage.lcov 2>/dev/null; then
              LCOV_PATH="/tmp/playwright-coverage.lcov"
              echo "✅ Found Playwright coverage at /app/monocart-report/coverage/lcov.info"
            elif docker cp ${COMPOSE_PROJECT_NAME:-freegle}-playwright:/app/coverage/lcov.info /tmp/playwright-coverage.lcov 2>/dev/null; then
              LCOV_PATH="/tmp/playwright-coverage.lcov"
              echo "✅ Found Playwright coverage at /app/coverage/lcov.info"
            fi

            if [ -n "$LCOV_PATH" ]; then
              # Check for Coveralls outage before uploading
              OUTAGE_JSON=$(curl -sf --max-time 10 "https://status.coveralls.io/api/v2/incidents/unresolved.json" 2>/dev/null || echo '{}')
              INCIDENT_COUNT=$(echo "$OUTAGE_JSON" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('incidents',[])))" 2>/dev/null || echo "0")
              if [ "$INCIDENT_COUNT" -gt 0 ]; then
                echo "⚠️ Coveralls has an active outage (see https://status.coveralls.io) - skipping upload"
              else
                npm install -g coveralls

                # Copy to original checkout if needed
                if [ -d ~/project/.git ]; then
                  cp "$LCOV_PATH" ~/project/coverage.lcov
                  cd ~/project
                fi

                export COVERALLS_SERVICE_NAME="circleci"
                export COVERALLS_SERVICE_JOB_ID="${CIRCLE_BUILD_NUM}"
                if cat "$LCOV_PATH" | coveralls; then
                  echo "✅ Playwright coverage uploaded successfully"
                else
                  echo "❌ Playwright coverage upload failed"
                  exit 1
                fi
              fi
            else
              echo "❌ Playwright coverage file not found"
              echo "Checking container for coverage files..."
              docker exec ${COMPOSE_PROJECT_NAME:-freegle}-playwright find /app -name "*.lcov" -o -name "lcov.info" -o -name "coverage*" 2>/dev/null | head -20 || true
              exit 1
            fi
          no_output_timeout: 50m

