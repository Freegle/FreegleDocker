                echo "Error details:"
                echo "$status_response" | jq -r '.logs // "No logs available"' | tail -50
                echo "LARAVEL_TESTS_PASSED=false" >> $BASH_ENV
                exit 1
              fi
            done

            # Upload Laravel coverage immediately after tests complete
            echo "📤 Uploading Laravel coverage..."
            if [ -z "${COVERALLS_REPO_TOKEN}" ]; then
              echo "⚠️ COVERALLS_REPO_TOKEN not set - skipping coverage upload"
              exit 0
            fi

            # Copy coverage file from container
            if docker cp ${COMPOSE_PROJECT_NAME:-freegle}-batch:/tmp/laravel-coverage.xml /tmp/laravel-clover.xml 2>/dev/null; then
              echo "✅ Found Laravel coverage file ($(stat -f%z /tmp/laravel-clover.xml 2>/dev/null || stat -c%s /tmp/laravel-clover.xml) bytes)"

              # Check for Coveralls outage before uploading
              OUTAGE_JSON=$(curl -sf --max-time 10 "https://status.coveralls.io/api/v2/incidents/unresolved.json" 2>/dev/null || echo '{}')
              INCIDENT_COUNT=$(echo "$OUTAGE_JSON" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('incidents',[])))" 2>/dev/null || echo "0")
              if [ "$INCIDENT_COUNT" -gt 0 ]; then
                echo "⚠️ Coveralls has an active outage (see https://status.coveralls.io) - skipping upload"
              else
                npm install -g coveralls
                docker exec ${COMPOSE_PROJECT_NAME:-freegle}-apiv1 bash -c "cd /var/www/iznik && php composer.phar require php-coveralls/php-coveralls --dev" || echo "php-coveralls install warning"

                # Copy coverage file to container and upload
                docker cp /tmp/laravel-clover.xml ${COMPOSE_PROJECT_NAME:-freegle}-apiv1:/var/www/iznik/clover.xml
                docker exec ${COMPOSE_PROJECT_NAME:-freegle}-apiv1 bash -c "cd /var/www/iznik && COVERALLS_REPO_TOKEN=${COVERALLS_REPO_TOKEN} COVERALLS_SERVICE_NAME=circleci COVERALLS_SERVICE_JOB_ID=${CIRCLE_BUILD_NUM} vendor/bin/php-coveralls -v --coverage_clover=clover.xml --json_path=/tmp/coveralls.json"

                if [ $? -eq 0 ]; then
                  echo "✅ Laravel coverage uploaded successfully"
                else
                  echo "❌ Laravel coverage upload failed"
                  exit 1
                fi
              fi
            else
              echo "❌ Laravel coverage file not found at /tmp/laravel-coverage.xml"
              exit 1
            fi
          no_output_timeout: 35m

  # === Artifact Collection ===

  collect-artifacts:
    description: "Collect build artifacts and logs"
    steps:
      - run:
          name: Collect artifacts
          command: |
            mkdir -p ~/artifacts

            # Support both FreegleDocker main build and submodule paths
            if [ -d "$HOME/FreegleDocker" ]; then
              cd "$HOME/FreegleDocker"
            fi

            # Collect Docker logs
            if docker-compose ps > /dev/null 2>&1; then
              docker-compose logs > ~/artifacts/docker-logs.txt 2>&1 || true
              docker-compose ps > ~/artifacts/docker-status.txt 2>&1 || true
            fi

            # Use fixed container names from docker-compose.yml (no dynamic lookup needed)

            # Collect PHPUnit test output files
            mkdir -p ~/artifacts/phpunit
            docker cp ${COMPOSE_PROJECT_NAME:-freegle}-apiv1-phpunit:/tmp/phpunit-output.log ~/artifacts/phpunit/ 2>/dev/null || true
            docker cp ${COMPOSE_PROJECT_NAME:-freegle}-apiv1-phpunit:/tmp/phpunit-debug.log ~/artifacts/phpunit/ 2>/dev/null || true

            # Collect Laravel (batch) test output and monitoring logs
            mkdir -p ~/artifacts/laravel
            docker cp ${COMPOSE_PROJECT_NAME:-freegle}-status:/tmp/laravel-bootstrap-cache-monitor.log ~/artifacts/laravel/ 2>/dev/null || true
            docker cp ${COMPOSE_PROJECT_NAME:-freegle}-batch:/tmp/bootstrap-cache-monitor.log ~/artifacts/laravel/inotify-raw.log 2>/dev/null || true
            docker cp ${COMPOSE_PROJECT_NAME:-freegle}-batch:/tmp/laravel-coverage.xml ~/artifacts/laravel/ 2>/dev/null || true

            # Collect Go test coverage
            mkdir -p ~/artifacts/go
            docker cp ${COMPOSE_PROJECT_NAME:-freegle}-apiv2:/app/coverage.out ~/artifacts/go/ 2>/dev/null || true
            docker cp ${COMPOSE_PROJECT_NAME:-freegle}-apiv2:/app/coverage.html ~/artifacts/go/ 2>/dev/null || true

            # Collect Playwright test artifacts
            # Copy the entire playwright-report folder to artifacts root so HTML can find its data/ subfolder
            echo "=== Collecting Playwright artifacts ==="

            # Check if container is running
            if docker ps --format '{{.Names}}' | grep -q '^${COMPOSE_PROJECT_NAME:-freegle}-playwright$'; then
              echo "✓ Playwright container is running"

              # List what's in the playwright-report directory
              echo "Contents of /app/playwright-report:"
              docker exec ${COMPOSE_PROJECT_NAME:-freegle}-playwright ls -la /app/playwright-report 2>&1 || echo "  (directory not accessible)"

              # Copy playwright-report
              if docker cp ${COMPOSE_PROJECT_NAME:-freegle}-playwright:/app/playwright-report ~/artifacts/ 2>&1; then
                echo "✓ Copied playwright-report"
                ls -la ~/artifacts/playwright-report/ 2>&1 | head -10
              else
                echo "✗ Failed to copy playwright-report"
              fi

              # Copy test-results
              if docker cp ${COMPOSE_PROJECT_NAME:-freegle}-playwright:/app/test-results ~/artifacts/ 2>&1; then
                echo "✓ Copied test-results"
              else
                echo "✗ Failed to copy test-results"
              fi
            else
              echo "✗ Playwright container is not running - cannot collect artifacts"
              echo "Container status:"
              docker ps -a --filter "name=playwright" --format "table {{.Names}}\t{{.Status}}"
            fi

            # Build info
            echo "CircleCI Build: $CIRCLE_BUILD_NUM" > ~/artifacts/build-info.txt
            echo "Branch: $CIRCLE_BRANCH" >> ~/artifacts/build-info.txt
            date >> ~/artifacts/build-info.txt
          when: always
      - run:
          name: Generate failure diagnostics
          command: |
            mkdir -p ~/artifacts

            {
              echo "=== CI FAILURE DIAGNOSTICS ==="
              echo "Build: $CIRCLE_BUILD_NUM"
              echo "Branch: $CIRCLE_BRANCH"
              echo "Commit: $CIRCLE_SHA1"
              echo "Job: $CIRCLE_JOB"
              echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo ""
              echo "=== FAILED TEST SUITES ==="
            } > ~/artifacts/ci-failure-diagnostics.txt

            # PHPUnit failures
            if [ -f ~/artifacts/phpunit/phpunit-output.log ]; then
              echo "--- PHPUnit ---" >> ~/artifacts/ci-failure-diagnostics.txt
              grep -E 'FAIL|Error|ERRORS!|FAILURES!' ~/artifacts/phpunit/phpunit-output.log >> ~/artifacts/ci-failure-diagnostics.txt 2>/dev/null || echo "  (no failure lines found)" >> ~/artifacts/ci-failure-diagnostics.txt
              echo "" >> ~/artifacts/ci-failure-diagnostics.txt
            fi

            # Go test failures
            if docker ps --format '{{.Names}}' | grep -q ${COMPOSE_PROJECT_NAME:-freegle}-apiv2; then
              GO_RESULT=$(docker exec ${COMPOSE_PROJECT_NAME:-freegle}-apiv2 cat /tmp/go-test-output.log 2>/dev/null || true)
              if echo "$GO_RESULT" | grep -qE 'FAIL|panic'; then
                echo "--- Go Tests ---" >> ~/artifacts/ci-failure-diagnostics.txt
                echo "$GO_RESULT" | grep -E 'FAIL|panic|--- FAIL' | tail -30 >> ~/artifacts/ci-failure-diagnostics.txt
                echo "" >> ~/artifacts/ci-failure-diagnostics.txt
              fi
            fi

            # Laravel test failures
            if [ -f ~/artifacts/laravel/laravel-coverage.xml ]; then
              LARAVEL_RESULT=$(docker exec ${COMPOSE_PROJECT_NAME:-freegle}-batch cat /tmp/laravel-test-output.log 2>/dev/null || true)
              if echo "$LARAVEL_RESULT" | grep -qE 'FAIL|Error'; then
                echo "--- Laravel Tests ---" >> ~/artifacts/ci-failure-diagnostics.txt
                echo "$LARAVEL_RESULT" | grep -E 'FAIL|Error' | tail -20 >> ~/artifacts/ci-failure-diagnostics.txt
                echo "" >> ~/artifacts/ci-failure-diagnostics.txt
              fi
            fi

            # Playwright failures
            if [ -d ~/artifacts/test-results ]; then
              echo "--- Playwright ---" >> ~/artifacts/ci-failure-diagnostics.txt
              find ~/artifacts/test-results -name '*.json' -exec grep -l '"status":"failed"' {} \; 2>/dev/null | while read f; do
                python3 -c "
            import json, sys
            with open('$f') as fh:
                d = json.load(fh)
                if d.get('status') == 'failed':
                    print(f'  FAIL: {d.get(\"title\",\"?\")}')
                    for r in d.get('results', []):
                        if r.get('status') == 'failed':
                            err = r.get('error', {}).get('message', '')[:200]
                            print(f'    {err}')
            " 2>/dev/null || true
              done >> ~/artifacts/ci-failure-diagnostics.txt
              echo "" >> ~/artifacts/ci-failure-diagnostics.txt
            fi

            # Container health at failure time
            echo "=== CONTAINER STATUS ===" >> ~/artifacts/ci-failure-diagnostics.txt
            docker ps -a --format 'table {{.Names}}\t{{.Status}}' >> ~/artifacts/ci-failure-diagnostics.txt 2>/dev/null || true
            echo "" >> ~/artifacts/ci-failure-diagnostics.txt

            # Resource snapshot
            echo "=== RESOURCES ===" >> ~/artifacts/ci-failure-diagnostics.txt
            free -h >> ~/artifacts/ci-failure-diagnostics.txt 2>/dev/null || true
            df -h / >> ~/artifacts/ci-failure-diagnostics.txt 2>/dev/null || true
          when: on_fail
      - store_artifacts:
          path: ~/artifacts

  upload-coverage:
    description: "Upload coverage reports to Coveralls"
    parameters:
      expected:
        type: string
        default: ""
        description: "Comma-separated list of expected coverage types (go,php,playwright). If specified, missing coverage is a failure."
    steps:
      - run:
          name: Check coverage prerequisites
          command: |
            EXPECTED_COVERAGE="<< parameters.expected >>"
            if [ -z "${COVERALLS_REPO_TOKEN}" ]; then
              if [ -n "$EXPECTED_COVERAGE" ]; then
                echo "❌ COVERALLS_REPO_TOKEN not set but coverage is expected: $EXPECTED_COVERAGE"
                exit 1
              fi
              echo "⚠️ COVERALLS_REPO_TOKEN not set - skipping coverage upload"
              echo "SKIP_COVERAGE=true" >> $BASH_ENV
            else
              # Check if Coveralls has a known outage before attempting uploads
              OUTAGE_JSON=$(curl -sf --max-time 10 "https://status.coveralls.io/api/v2/incidents/unresolved.json" 2>/dev/null || echo '{}')
              INCIDENT_COUNT=$(echo "$OUTAGE_JSON" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('incidents',[])))" 2>/dev/null || echo "0")
              if [ "$INCIDENT_COUNT" -gt 0 ]; then
                INCIDENT_NAME=$(echo "$OUTAGE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['incidents'][0]['name'])" 2>/dev/null || echo "unknown")
                echo "⚠️ Coveralls has an active outage: $INCIDENT_NAME (see https://status.coveralls.io)"
                echo "⚠️ Skipping coverage upload - will not fail the build for a known external outage"
                echo "SKIP_COVERAGE=true" >> $BASH_ENV
              else
                npm install -g coveralls
                echo "GO_UPLOADED=false" >> $BASH_ENV
                echo "PHP_UPLOADED=false" >> $BASH_ENV
                echo "PLAYWRIGHT_UPLOADED=false" >> $BASH_ENV
                echo "LARAVEL_UPLOADED=false" >> $BASH_ENV
              fi
            fi
          when: always
      - run:
          name: Upload Go coverage
          command: |
            if [ "$SKIP_COVERAGE" = "true" ]; then exit 0; fi
            # Support both FreegleDocker main build and submodule paths
            if [ -d "$HOME/FreegleDocker" ]; then
              cd "$HOME/FreegleDocker"
            fi
            echo "Working directory: $(pwd)"
            echo "Docker-compose services:"
            docker-compose ps || echo "docker-compose ps failed"
            # Use fixed container name from docker-compose.yml
            if docker cp ${COMPOSE_PROJECT_NAME:-freegle}-apiv2:/app/coverage.out iznik-server-go/coverage.out 2>/dev/null; then
              echo "Found Go coverage..."
              go install github.com/jandelgado/gcov2lcov@latest || true
              if command -v gcov2lcov > /dev/null; then
                cd iznik-server-go
                if gcov2lcov -infile=coverage.out -outfile=coverage.lcov 2>&1 && [ -s coverage.lcov ]; then
                  # Copy lcov to original checkout for coveralls (needs .git)
                  if [ -d ~/project/.git ]; then
                    cp coverage.lcov ~/project/
                    cd ~/project
                  else
                    cd ..
                  fi
                  export COVERALLS_SERVICE_NAME="circleci"
                  export COVERALLS_SERVICE_JOB_ID="${CIRCLE_BUILD_NUM}"
                  if cat coverage.lcov | coveralls; then
                    echo "✅ Go coverage uploaded"
                    echo "GO_UPLOADED=true" >> $BASH_ENV
                  else
                    echo "❌ Go coverage upload failed"
                    exit 1
                  fi
                else
                  echo "❌ Failed to convert Go coverage to lcov format"
                  cd ..
                  exit 1
                fi
              else
                echo "❌ gcov2lcov not found"
                exit 1
              fi
            else
              echo "ℹ️ No Go coverage found (this is OK if Go tests didn't run)"
            fi
          when: always
      - run:
          name: Upload PHP coverage
          command: |
            if [ "$SKIP_COVERAGE" = "true" ]; then exit 0; fi
            # Support both FreegleDocker main build and submodule paths
            if [ -d "$HOME/FreegleDocker" ]; then
              cd "$HOME/FreegleDocker"
            fi
            # Use fixed container name from docker-compose.yml
            COVERAGE_FOUND=false

            # Try the standard test path first (used by PR tests)
            if docker cp ${COMPOSE_PROJECT_NAME:-freegle}-apiv1-phpunit:/var/www/iznik/test/ut/php/clover.xml /tmp/phpunit-clover.xml 2>/dev/null; then
              COVERAGE_FOUND=true
              echo "Found PHP coverage at /var/www/iznik/test/ut/php/clover.xml"
            # Also try /tmp/phpunit-coverage.xml (used by status service when running via API)
            elif docker cp ${COMPOSE_PROJECT_NAME:-freegle}-apiv1-phpunit:/tmp/phpunit-coverage.xml /tmp/phpunit-clover.xml 2>/dev/null; then
              COVERAGE_FOUND=true
              echo "Found PHP coverage at /tmp/phpunit-coverage.xml"
            fi

            if [ "$COVERAGE_FOUND" = "true" ]; then
              echo "Processing PHP coverage..."

              # Install php-coveralls in the container using composer.phar
              docker exec ${COMPOSE_PROJECT_NAME:-freegle}-apiv1 bash -c "cd /var/www/iznik && php composer.phar require php-coveralls/php-coveralls --dev 2>&1" || true

              # Copy coverage file to container
              docker cp /tmp/phpunit-clover.xml ${COMPOSE_PROJECT_NAME:-freegle}-apiv1:/var/www/iznik/clover.xml

              # Create coveralls config in container with writable json_path
              docker exec ${COMPOSE_PROJECT_NAME:-freegle}-apiv1 bash -c "echo 'coverage_clover: clover.xml' > /var/www/iznik/.coveralls.yml && echo 'json_path: /tmp/coveralls-upload.json' >> /var/www/iznik/.coveralls.yml && echo 'service_name: circleci' >> /var/www/iznik/.coveralls.yml"

              # Initialize a minimal git repo in container for php-coveralls (it needs git info)
              # The submodule's .git file points to a path not mounted in container
              # Must create an initial commit so there's a branch for collectBranch()
              docker exec ${COMPOSE_PROJECT_NAME:-freegle}-apiv1 bash -c "cd /var/www/iznik && rm -f .git && git init && git config user.email 'ci@freegle.org' && git config user.name 'CircleCI' && git remote add origin https://github.com/Freegle/Iznik.git && git commit --allow-empty -m 'CI initial commit' && git branch -M $CIRCLE_BRANCH"

              # Run php-coveralls from within the container (which has PHP)
              # All coverage now goes to the monorepo Coveralls project
              # Pass git info via environment variables since container doesn't have access to .git/modules
              if docker exec \
                -e COVERALLS_REPO_TOKEN="$COVERALLS_REPO_TOKEN" \
                -e COVERALLS_RUN_LOCALLY=1 \
                -e CI_BRANCH="$CIRCLE_BRANCH" \
                -e CI_COMMIT_ID="$CIRCLE_SHA1" \
                -e CI_BUILD_NUMBER="$CIRCLE_BUILD_NUM" \
                -e CI_BUILD_URL="$CIRCLE_BUILD_URL" \
                -e CI_NAME="circleci" \
                ${COMPOSE_PROJECT_NAME:-freegle}-apiv1 bash -c "cd /var/www/iznik && php composer/vendor/bin/php-coveralls -v --config .coveralls.yml --exclude-no-stmt 2>&1"; then
                echo "✅ PHP coverage uploaded"
                echo "PHP_UPLOADED=true" >> $BASH_ENV
              else
                echo "❌ PHP coverage upload failed"
                exit 1
              fi
            else
              echo "ℹ️ No PHP coverage found at either location"
            fi
          when: always
      - run:
          name: Upload Playwright coverage
          command: |
            if [ "$SKIP_COVERAGE" = "true" ]; then exit 0; fi
            # Support both FreegleDocker main build and submodule paths
            if [ -d "$HOME/FreegleDocker" ]; then
              cd "$HOME/FreegleDocker"
            fi
            # Use fixed container name from docker-compose.yml
            LCOV_PATH=""
            if docker cp ${COMPOSE_PROJECT_NAME:-freegle}-playwright:/app/coverage/lcov.info /tmp/playwright-coverage.lcov 2>/dev/null; then
              LCOV_PATH="/tmp/playwright-coverage.lcov"
            elif docker cp ${COMPOSE_PROJECT_NAME:-freegle}-playwright:/app/monocart-report/coverage/lcov.info /tmp/playwright-coverage.lcov 2>/dev/null; then
              LCOV_PATH="/tmp/playwright-coverage.lcov"
            fi
            if [ -n "$LCOV_PATH" ]; then
              echo "Found Playwright coverage..."
              export COVERALLS_SERVICE_NAME="circleci"
              export COVERALLS_SERVICE_JOB_ID="${CIRCLE_BUILD_NUM}"
              # Run from original checkout for git metadata
              if [ -d ~/project/.git ]; then
                cp "$LCOV_PATH" ~/project/coverage.lcov
                cd ~/project
                if cat coverage.lcov | coveralls; then
                  echo "✅ Playwright coverage uploaded"
                  echo "PLAYWRIGHT_UPLOADED=true" >> $BASH_ENV
                else
                  echo "❌ Playwright coverage upload failed"
                  exit 1
                fi
              else
                if cat "$LCOV_PATH" | coveralls; then
                  echo "✅ Playwright coverage uploaded"
                  echo "PLAYWRIGHT_UPLOADED=true" >> $BASH_ENV
                else
                  echo "❌ Playwright coverage upload failed"
                  exit 1
                fi
              fi
            else
              echo "ℹ️ No Playwright coverage found (this is OK if Playwright tests didn't run)"
            fi
          when: always
      - run:
          name: Upload Laravel coverage
          command: |
            if [ "$SKIP_COVERAGE" = "true" ]; then exit 0; fi
            # Support both FreegleDocker main build and submodule paths
            if [ -d "$HOME/FreegleDocker" ]; then
              cd "$HOME/FreegleDocker"
            fi

            # Copy Laravel coverage from batch container
            if docker cp ${COMPOSE_PROJECT_NAME:-freegle}-batch:/tmp/laravel-coverage.xml /tmp/laravel-clover.xml 2>/dev/null; then
              echo "Found Laravel coverage..."

              # Run php-coveralls from inside the batch container which has PHP
              # Copy the coverage file and run coveralls from there
              docker cp /tmp/laravel-clover.xml ${COMPOSE_PROJECT_NAME:-freegle}-batch:/var/www/html/clover.xml

              # Create coveralls config in container
              docker exec ${COMPOSE_PROJECT_NAME:-freegle}-batch bash -c "cd /var/www/html && echo 'coverage_clover: clover.xml' > .coveralls.yml && echo 'json_path: /tmp/coveralls-upload.json' >> .coveralls.yml && echo 'service_name: circleci' >> .coveralls.yml"

              # Install php-coveralls in the batch container
              echo "Installing php-coveralls in batch container..."
              if ! docker exec ${COMPOSE_PROJECT_NAME:-freegle}-batch composer require php-coveralls/php-coveralls --dev 2>&1; then
                echo "❌ Could not install php-coveralls in batch container"
                exit 1
              fi

              # Initialize git repo in container (php-coveralls needs it for git info including remotes)
              echo "Initializing git repo in container for php-coveralls..."
              docker exec ${COMPOSE_PROJECT_NAME:-freegle}-batch bash -c "cd /var/www/html && git config --global --add safe.directory /var/www/html && git init && git config user.email 'circleci@freegle.org' && git config user.name 'CircleCI' && git remote add origin https://github.com/Freegle/Iznik.git && git add -A && git commit -m 'CI commit' --allow-empty" 2>/dev/null || true

              # Run php-coveralls from within the container
              # Note: Uses main COVERALLS_REPO_TOKEN since iznik-batch is part of FreegleDocker
              if docker exec -e COVERALLS_REPO_TOKEN="$COVERALLS_REPO_TOKEN" \
                 -e COVERALLS_RUN_LOCALLY=1 \
                 -e CI_NAME=circleci \
                 -e CI_BUILD_NUMBER="$CIRCLE_BUILD_NUM" \
                 -e CI_BRANCH="$CIRCLE_BRANCH" \
                 -e CI_COMMIT_ID="$CIRCLE_SHA1" \
                 ${COMPOSE_PROJECT_NAME:-freegle}-batch bash -c "cd /var/www/html && vendor/bin/php-coveralls -v --config .coveralls.yml 2>&1"; then
                echo "✅ Laravel coverage uploaded"
                echo "LARAVEL_UPLOADED=true" >> $BASH_ENV
              else
                echo "❌ Laravel coverage upload failed"
                docker exec ${COMPOSE_PROJECT_NAME:-freegle}-batch ls -la /var/www/html/vendor/bin/ 2>&1 || true
                exit 1
              fi
            else
              echo "ℹ️ No Laravel coverage found at /tmp/laravel-coverage.xml (this is OK if Laravel tests didn't run)"
            fi
          when: always
      - run:
          name: Validate expected coverage
          command: |
            if [ "$SKIP_COVERAGE" = "true" ]; then exit 0; fi
            EXPECTED="<< parameters.expected >>"
            if [ -z "$EXPECTED" ]; then exit 0; fi
            echo "📋 Validating expected coverage: $EXPECTED"
            MISSING=""
            IFS=',' read -ra TYPES \<<< "$EXPECTED"
            for t in "${TYPES[@]}"; do
              t=$(echo "$t" | xargs)
              case "$t" in
                go) [ "$GO_UPLOADED" != "true" ] && MISSING="$MISSING go" ;;
                php) [ "$PHP_UPLOADED" != "true" ] && MISSING="$MISSING php" ;;
                playwright) [ "$PLAYWRIGHT_UPLOADED" != "true" ] && MISSING="$MISSING playwright" ;;
                laravel) [ "$LARAVEL_UPLOADED" != "true" ] && MISSING="$MISSING laravel" ;;
              esac
            done
            if [ -n "$MISSING" ]; then
              echo "❌ Missing expected coverage:$MISSING"
              exit 1
            fi
            echo "✅ All expected coverage uploaded"
          when: always

  # === App Build Commands ===

  setup-android-fastlane:
    description: "Install Ruby, Bundler, and Fastlane for Android builds"
    steps:
      - run:
          name: Install Ruby and Bundler
          command: |
            sudo apt-get update
            sudo apt-get install -y ruby-full
            sudo gem install bundler
          max_auto_reruns: 3
          auto_rerun_delay: 10s
      - run:
          name: Install Fastlane
          command: |
            bundle config set --local path 'vendor/bundle'
            bundle update fastlane
            bundle install
          max_auto_reruns: 3
          auto_rerun_delay: 10s
      - run:
          name: Decode Google Play JSON Key
          command: |
            echo "🔐 Decoding Google Play JSON Key..."

            if [ -z "$GOOGLE_PLAY_JSON_KEY" ]; then
              echo "❌ CRITICAL: GOOGLE_PLAY_JSON_KEY environment variable is not set"
              exit 1
            fi

            echo "$GOOGLE_PLAY_JSON_KEY" | tr -d '\n' | base64 -d > fastlane/google-play-api-key.json

            if [ ! -f fastlane/google-play-api-key.json ]; then
              echo "❌ CRITICAL: Failed to create google-play-api-key.json"
              exit 1
            fi

            FILE_SIZE=$(wc -c < fastlane/google-play-api-key.json)
            echo "✅ File created: $FILE_SIZE bytes"

            if [ "$FILE_SIZE" -eq 0 ]; then
              echo "❌ CRITICAL: google-play-api-key.json is empty"
              exit 1
            fi

            if python3 -m json.tool fastlane/google-play-api-key.json > /dev/null 2>&1; then
              echo "✅ Valid JSON structure"
              echo "📧 Service Account: $(python3 -c "import json; print(json.load(open('fastlane/google-play-api-key.json'))['client_email'])")"
            else
              echo "❌ CRITICAL: Invalid JSON - Google Play API will not work!"
              exit 1
            fi

            echo "✅ Google Play JSON Key validated successfully"

jobs:
  # === FreegleDocker Main Build Job ===

  build-and-test:
    parameters:
      use-executor:
        type: executor
        default: machine-executor
    executor: << parameters.use-executor >>
    steps:
      # Fix ownership of root-owned files BEFORE checkout so git can write
      - run:
          name: Fix file ownership before checkout
          command: |
            # Docker creates files with root ownership that git checkout can't overwrite
            # On self-hosted runner, also clean up leftover Docker containers/volumes
            if [ "${SELF_HOSTED_RUNNER:-false}" = "true" ]; then
              echo "Self-hosted runner: cleaning up previous Docker resources..."
              docker compose down --volumes --remove-orphans 2>/dev/null || true
              sudo rm -rf logs data test-results ssl/certs status/data 2>/dev/null || true
            fi
            echo "Fixing file ownership..."
            sudo chown -R $(id -u):$(id -g) . 2>/dev/null || true
            echo "Ownership fixed"

      - checkout

      - run:
          name: Pre-create runtime directories
          command: |
            # Pre-create directories with correct ownership so Docker doesn't create them as root
            mkdir -p ssl/certs logs data status/data test-results

            # Set COMPOSE_FILE based on whether ports overlay exists (backward compat with master)
            if [ -f docker-compose.ports.yml ]; then
              echo 'export COMPOSE_FILE="docker-compose.yml:docker-compose.ports.yml"' >> $BASH_ENV
              echo "✅ Using split compose files (docker-compose.yml + docker-compose.ports.yml)"
            else
              echo 'export COMPOSE_FILE="docker-compose.yml"' >> $BASH_ENV
              echo "ℹ️  Using single docker-compose.yml (ports inline)"
            fi

      - run:
          name: Check if only plans or yesterday files changed
          command: |
            if [ "$CIRCLE_BRANCH" = "master" ]; then
              CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r HEAD)
            else
              CHANGED_FILES=$(git diff --name-only origin/master...HEAD)
            fi

            if [ -n "$CHANGED_FILES" ]; then
              NON_SKIPPABLE_FILES=$(echo "$CHANGED_FILES" | grep -v -E '^(plans/|yesterday/)' || true)
              if [ -z "$NON_SKIPPABLE_FILES" ]; then
                echo "Only plans/ or yesterday/ files were changed. Skipping build."
                circleci-agent step halt
              fi
            fi

      - run:
          name: Verify monorepo subtree directories
          command: |
            echo "=== Verifying subtree directories ==="
            ls -d iznik-nuxt3/ iznik-server-go/ iznik-server/ iznik-batch/ || { echo "ERROR: subtree directories missing"; exit 1; }

            # ModTools is now built from iznik-nuxt3/modtools (same repo, different build)
            echo "=== Verifying modtools directory ==="
            ls -la iznik-nuxt3/modtools/Dockerfile* || echo "WARNING: modtools/Dockerfile files not found"

      - run:
          name: Determine changed paths
          command: |
            # Compare against merge base with master for feature branches (not just last commit)
            if [ "$CIRCLE_BRANCH" != "master" ]; then
              git fetch origin master --depth=50 2>/dev/null || true
              MERGE_BASE=$(git merge-base origin/master HEAD 2>/dev/null || echo "")
              if [ -n "$MERGE_BASE" ]; then
                CHANGED=$(git diff --name-only "$MERGE_BASE" HEAD 2>/dev/null || echo "ALL")
              else
                CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "ALL")
              fi
            else
              CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "ALL")
            fi

            SKIP_GO=true
            SKIP_VITEST=true
            SKIP_PLAYWRIGHT=true
            SKIP_LARAVEL=true

            if echo "$CHANGED" | grep -q '^iznik-server-go/'; then SKIP_GO=false; fi
            if echo "$CHANGED" | grep -q '^iznik-nuxt3/'; then SKIP_VITEST=false; SKIP_PLAYWRIGHT=false; fi
            if echo "$CHANGED" | grep -q '^iznik-batch/'; then SKIP_LARAVEL=false; fi

            # Shared files → run everything
            if echo "$CHANGED" | grep -qE '^(docker-compose|\.circleci|scripts/|testenv)'; then
              SKIP_GO=false; SKIP_VITEST=false; SKIP_PLAYWRIGHT=false; SKIP_LARAVEL=false
            fi

            # Master branch always runs everything
            if [ "$CIRCLE_BRANCH" = "master" ]; then
              SKIP_GO=false; SKIP_VITEST=false; SKIP_PLAYWRIGHT=false; SKIP_LARAVEL=false
            fi

            echo "export SKIP_GO=$SKIP_GO" >> "$BASH_ENV"
            echo "export SKIP_VITEST=$SKIP_VITEST" >> "$BASH_ENV"
            echo "export SKIP_PLAYWRIGHT=$SKIP_PLAYWRIGHT" >> "$BASH_ENV"
            echo "export SKIP_LARAVEL=$SKIP_LARAVEL" >> "$BASH_ENV"
            echo "Path filter: GO=$SKIP_GO VITEST=$SKIP_VITEST PW=$SKIP_PLAYWRIGHT LARAVEL=$SKIP_LARAVEL"

      - setup-dependencies

      - start-docker-services:
          reason: "Starting all Docker services"

      # Two-phase startup in start-docker-services handles:
      # 1. Infrastructure + batch (migrations) + test database creation
      # 2. All application containers (databases already exist)
      # So we just need to wait for the application containers to be ready.
      - wait-for-basic-services
      - wait-for-prod-container

      # Run Vitest unit tests first (fast, fail-fast before slower tests)
      - run-vitest-tests:
          reason: "Running Vitest unit tests (fail-fast before parallel tests)"

      # Run iznik-batch, Playwright, Go, and iznik-server tests in parallel via status API
      - run:
          name: Run iznik-batch, Playwright, Go, and iznik-server tests in parallel
          command: |
            echo "🚀 Running all tests in parallel via status API..."
            mkdir -p ~/test-output
            TESTS_KILLED_EARLY=false

            # === INITIALIZE RESULT FILES ===
            # On self-hosted runner (cleanup_working_directory: false), stale /tmp files
            # from previous runs persist. Initialize all result files to prevent false results.
            for f in laravel go php playwright; do
              echo "pending" > /tmp/${f}-result
            done
            rm -f /tmp/watchdog-triggered /tmp/watchdog-pid

            # === WATCHDOG TIMEOUT ===
            # Start a watchdog that will force-stop tests after 48 minutes
            # This leaves ~12 minutes for artifact collection before CircleCI's 60-min hard limit
            WATCHDOG_TIMEOUT_MINUTES=48
            echo "⏱️ Starting watchdog timer (${WATCHDOG_TIMEOUT_MINUTES} minutes)..."
            (
              sleep $((WATCHDOG_TIMEOUT_MINUTES * 60))
              echo "⏰ WATCHDOG: ${WATCHDOG_TIMEOUT_MINUTES}-minute timeout reached!"
              echo "timeout" > /tmp/watchdog-triggered
              # Kill all background test processes
              pkill -f "curl.*localhost:${PORT_STATUS:-8081}/api/tests" 2>/dev/null || true
              # Signal the main process to check the marker
              kill -USR1 $$ 2>/dev/null || true
            ) &
            WATCHDOG_PID=$!
            echo "WATCHDOG_PID=$WATCHDOG_PID" > /tmp/watchdog-pid

            # Trap to check watchdog on signal
            trap 'if [ -f /tmp/watchdog-triggered ]; then echo "⏰ Tests terminated by watchdog timeout"; fi' USR1

            # Start iznik-batch tests in background
            echo "🧪 Starting iznik-batch tests in background..."
            (
              if [ "$SKIP_LARAVEL" = "true" ]; then
                echo "Skipping Laravel tests — no changes in iznik-batch/"
                echo "pass" > /tmp/laravel-result
                echo "0" > /tmp/laravel-completed
                echo "0" > /tmp/laravel-total
                exit 0
              fi
              # Trigger Laravel tests via status API
              response=$(curl -s -w "%{http_code}" -X POST -H "Content-Type: application/json" http://localhost:${PORT_STATUS:-8081}/api/tests/laravel)
              http_code="${response: -3}"

              if [ "$http_code" = "409" ]; then
                echo "⚠️ iznik-batch tests already running (HTTP 409) - joining existing run"
              elif [ "$http_code" -ne "200" ]; then
                echo "❌ Failed to trigger iznik-batch tests. HTTP code: $http_code"
                echo "fail" > /tmp/laravel-result
                echo "0" > /tmp/laravel-completed
                echo "0" > /tmp/laravel-total
                exit 1
              else
                echo "✅ iznik-batch tests triggered successfully"
              fi

              # Mark as running so fail-fast can detect killed tests
              echo "running" > /tmp/laravel-result

              # Poll for Laravel completion
              while true; do
                sleep 10
                status_response=$(curl -s http://localhost:${PORT_STATUS:-8081}/api/tests/laravel/status || echo '{"status":"error"}')
                status=$(echo "$status_response" | jq -r '.status // "unknown"')

                # Extract progress for display
                completed=$(echo "$status_response" | jq -r '.progress.completed // 0')
                total=$(echo "$status_response" | jq -r '.progress.total // 0')
                echo "$completed" > /tmp/laravel-completed
                echo "$total" > /tmp/laravel-total

                if [ "$status" = "completed" ]; then
                  success=$(echo "$status_response" | jq -r '.success // false')
                  if [ "$success" = "true" ]; then
                    echo "pass" > /tmp/laravel-result
                    echo "✅ iznik-batch tests passed!"
                  else
                    echo "fail" > /tmp/laravel-result
                    echo "❌ iznik-batch tests failed!"
                  fi
                  # Always write logs to output file for artifacts
                  echo "$status_response" | jq -r '.logs // "No logs"'
                  break
                elif [ "$status" = "failed" ] || [ "$status" = "error" ]; then
                  echo "fail" > /tmp/laravel-result
                  echo "❌ iznik-batch tests failed!"
                  echo "$status_response" | jq -r '.logs // "No logs"'
                  break
                fi
              done
            ) > ~/test-output/laravel.out 2>&1 &
            LARAVEL_PID=$!

            # Start Go tests in background
            echo "🧪 Starting Go tests in background..."
            (
              if [ "$SKIP_GO" = "true" ]; then
                echo "Skipping Go tests — no changes in iznik-server-go/"
                echo "pass" > /tmp/go-result
                echo "0" > /tmp/go-completed
                echo "0" > /tmp/go-total
                exit 0
              fi
              # Trigger Go tests via status API
              response=$(curl -s -w "%{http_code}" -X POST -H "Content-Type: application/json" "http://localhost:${PORT_STATUS:-8081}/api/tests/go?coverage=true")
              http_code="${response: -3}"

              if [ "$http_code" = "409" ]; then
                echo "⚠️ Go tests already running (HTTP 409) - joining existing run"
              elif [ "$http_code" -ne "200" ]; then
                echo "❌ Failed to trigger Go tests. HTTP code: $http_code"
                echo "fail" > /tmp/go-result
                echo "0" > /tmp/go-completed
                echo "0" > /tmp/go-total
                exit 1
              else
                echo "✅ Go tests triggered successfully"
              fi

              # Mark as running so fail-fast can detect killed tests
              echo "running" > /tmp/go-result

              # Poll for Go completion
              while true; do
                sleep 10
                status_response=$(curl -s http://localhost:${PORT_STATUS:-8081}/api/tests/go/status || echo '{"status":"error"}')
                status=$(echo "$status_response" | jq -r '.status // "unknown"')

                # Extract progress for display
                completed=$(echo "$status_response" | jq -r '.progress.completed // 0')
                total=$(echo "$status_response" | jq -r '.progress.total // 0')
                echo "$completed" > /tmp/go-completed
                echo "$total" > /tmp/go-total

                if [ "$status" = "completed" ]; then
                  success=$(echo "$status_response" | jq -r '.success // false')
                  if [ "$success" = "true" ]; then
                    echo "pass" > /tmp/go-result
                    echo "✅ Go tests passed!"
                  else
                    echo "fail" > /tmp/go-result
                    echo "❌ Go tests failed!"
                  fi
                  # Always write logs to output file for artifacts
                  echo "$status_response" | jq -r '.logs // "No logs"'
                  break
                elif [ "$status" = "failed" ] || [ "$status" = "error" ]; then
                  echo "fail" > /tmp/go-result
                  echo "❌ Go tests failed!"
                  echo "$status_response" | jq -r '.logs // "No logs"'
                  break
                fi
              done
            ) > ~/test-output/go.out 2>&1 &
            GO_PID=$!

            # Start iznik-server tests in background (uses separate iznik_phpunit_test database)
            echo "🧪 Starting iznik-server tests in background..."
            (
              # Restore GeoIP database from cache if available
              if [ -f ~/geoip-cache/GeoLite2-Country.mmdb ]; then
                echo "📍 Restoring GeoIP database from cache..."
                docker exec ${COMPOSE_PROJECT_NAME:-freegle}-apiv1-phpunit mkdir -p /var/lib/GeoIP
                docker cp ~/geoip-cache/GeoLite2-Country.mmdb ${COMPOSE_PROJECT_NAME:-freegle}-apiv1-phpunit:/var/lib/GeoIP/GeoLite2-Country.mmdb
                docker cp ~/geoip-cache/GeoLite2-City.mmdb ${COMPOSE_PROJECT_NAME:-freegle}-apiv1-phpunit:/var/lib/GeoIP/GeoLite2-City.mmdb 2>/dev/null || true
              fi

              # Trigger PHPUnit tests via API
              response=$(curl -s -w "%{http_code}" -X POST -H "Content-Type: application/json" http://localhost:${PORT_STATUS:-8081}/api/tests/php)
              http_code="${response: -3}"

              if [ "$http_code" = "409" ]; then
                echo "⚠️ PHP tests already running (HTTP 409) - joining existing run"
              elif [ "$http_code" -ne "200" ]; then
                echo "❌ Failed to trigger PHP tests. HTTP code: $http_code"
                echo "fail" > /tmp/php-result
                echo "0" > /tmp/php-completed
                echo "0" > /tmp/php-total
                exit 1
              else
                echo "✅ PHP tests triggered successfully"
              fi

              # Mark as running so fail-fast can detect killed tests
              echo "running" > /tmp/php-result

              # Poll for PHPUnit completion
              while true; do
                sleep 10
                status_response=$(curl -s http://localhost:${PORT_STATUS:-8081}/api/tests/php/status || echo '{"status":"error"}')
                status=$(echo "$status_response" | jq -r '.status // "unknown"')
                # Extract progress counts for display
                completed=$(echo "$status_response" | jq -r '.progress.completed // 0')
                total=$(echo "$status_response" | jq -r '.progress.total // 0')
                echo "$completed" > /tmp/php-completed
                echo "$total" > /tmp/php-total


                if [ "$status" = "completed" ]; then
                  success=$(echo "$status_response" | jq -r '.success // false')
                  if [ "$success" = "true" ]; then
                    echo "pass" > /tmp/php-result
                    echo "✅ iznik-server tests passed!"
                  else
                    echo "fail" > /tmp/php-result
                    echo "❌ iznik-server tests failed!"
                  fi
                  # Always write logs to output file for artifacts
                  echo "$status_response" | jq -r '.logs // "No logs"'
                  break
                elif [ "$status" = "failed" ] || [ "$status" = "error" ]; then
                  echo "fail" > /tmp/php-result
                  echo "❌ iznik-server tests failed!"
                  echo "$status_response" | jq -r '.logs // "No logs"'
                  break
                fi
              done
            ) > ~/test-output/phpunit.out 2>&1 &
            PHPUNIT_PID=$!

            # Start Playwright tests in background
            echo "🎭 Starting Playwright tests in background..."
            (
              if [ "$SKIP_PLAYWRIGHT" = "true" ]; then
                echo "Skipping Playwright tests — no changes in iznik-nuxt3/"
                echo "pass" > /tmp/playwright-result
                echo "0" > /tmp/playwright-completed
                echo "0" > /tmp/playwright-total
                exit 0
              fi
              # Trigger Playwright tests via status API
              response=$(curl -s -w "%{http_code}" -X POST -H "Content-Type: application/json" http://localhost:${PORT_STATUS:-8081}/api/tests/playwright)
              http_code="${response: -3}"

              if [ "$http_code" = "409" ]; then
                echo "⚠️ Playwright tests already running (HTTP 409) - joining existing run"
              elif [ "$http_code" -ne "200" ]; then
                echo "❌ Failed to trigger Playwright tests. HTTP code: $http_code"
                echo "fail" > /tmp/playwright-result
                # Initialize progress files for display
                echo "0" > /tmp/playwright-completed
                echo "0" > /tmp/playwright-total
                exit 1
              else
                echo "✅ Playwright tests triggered successfully"
              fi

              # Mark as running so fail-fast can detect killed tests
              echo "running" > /tmp/playwright-result

              # Poll for completion
              while true; do
                sleep 10
                status_response=$(curl -s http://localhost:${PORT_STATUS:-8081}/api/tests/playwright/status || echo '{"status":"error"}')
                status=$(echo "$status_response" | jq -r '.status // "unknown"')
                completed=$(echo "$status_response" | jq -r '.progress.completed // 0')
                total=$(echo "$status_response" | jq -r '.progress.total // 0')

                # Update progress files
                echo "$completed" > /tmp/playwright-completed
                echo "$total" > /tmp/playwright-total

                if [ "$status" = "completed" ]; then
                  success=$(echo "$status_response" | jq -r '.success // false')
                  if [ "$success" = "true" ]; then
                    echo "pass" > /tmp/playwright-result
                    echo "✅ Playwright tests passed!"
                  else
                    echo "fail" > /tmp/playwright-result
                    echo "❌ Playwright tests failed!"
                  fi
                  # Always write logs to output file for artifacts
                  echo "$status_response" | jq -r '.logs // "No logs"'
                  break
                elif [ "$status" = "failed" ] || [ "$status" = "error" ]; then
                  echo "fail" > /tmp/playwright-result
                  echo "❌ Playwright tests failed!"
                  echo "$status_response" | jq -r '.logs // "No logs"'
                  break
                fi
              done
            ) > ~/test-output/playwright.out 2>&1 &
            PLAYWRIGHT_PID=$!

            # Unified monitoring loop for all 4 tests
            echo "📊 Monitoring all tests..."
            start_time=$(date +%s)
            timeout_duration=2700  # 45 minutes
            TESTS_KILLED_EARLY=false

            while true; do
              current_time=$(date +%s)
              elapsed=$((current_time - start_time))
              elapsed_min=$((elapsed / 60))

              if [ $elapsed -gt $timeout_duration ]; then
                echo "⏰ Tests timed out after 45 minutes"
                kill $LARAVEL_PID $GO_PID $PHPUNIT_PID $PLAYWRIGHT_PID 2>/dev/null || true
                TESTS_KILLED_EARLY=true
                break
              fi

              # Check if watchdog triggered (overall job timeout approaching)
              if [ -f /tmp/watchdog-triggered ]; then
                echo "⏰ WATCHDOG: Overall job timeout - stopping tests to collect artifacts"
                echo "timeout" > /tmp/playwright-result
                kill $LARAVEL_PID 2>/dev/null || true
                kill $GO_PID 2>/dev/null || true
                kill $PHPUNIT_PID 2>/dev/null || true
                TESTS_KILLED_EARLY=true
                break
              fi

              sleep 10

              status_response=$(curl -s http://localhost:${PORT_STATUS:-8081}/api/tests/playwright/status || echo '{"status":"error"}')
              status=$(echo "$status_response" | jq -r '.status // "unknown"')
              completed=$(echo "$status_response" | jq -r '.progress.completed // 0')
              total=$(echo "$status_response" | jq -r '.progress.total // 0')

              elapsed_min=$((elapsed / 60))
              LARAVEL_STATUS=$([ -f /tmp/laravel-result ] && cat /tmp/laravel-result || echo 'running')
              LARAVEL_COMPLETED=$([ -f /tmp/laravel-completed ] && cat /tmp/laravel-completed || echo '0')
              LARAVEL_TOTAL=$([ -f /tmp/laravel-total ] && cat /tmp/laravel-total || echo '0')
              LARAVEL_DISPLAY=$([ "$LARAVEL_STATUS" = "running" ] && echo "running ($LARAVEL_COMPLETED/$LARAVEL_TOTAL)" || echo "$LARAVEL_STATUS")

              GO_STATUS=$([ -f /tmp/go-result ] && cat /tmp/go-result || echo 'running')
              GO_COMPLETED=$([ -f /tmp/go-completed ] && cat /tmp/go-completed || echo '0')
              GO_TOTAL=$([ -f /tmp/go-total ] && cat /tmp/go-total || echo '0')
              # Go doesn't have a pre-count, so show just completed when total is 0
              if [ "$GO_STATUS" = "running" ]; then
                if [ "$GO_TOTAL" -gt 0 ]; then
                  GO_DISPLAY="running ($GO_COMPLETED/$GO_TOTAL)"
                else
                  GO_DISPLAY="running ($GO_COMPLETED)"
                fi
              else
                GO_DISPLAY="$GO_STATUS"
              fi

              PHP_STATUS=$([ -f /tmp/php-result ] && cat /tmp/php-result || echo 'running')
              PHP_COMPLETED=$([ -f /tmp/php-completed ] && cat /tmp/php-completed || echo '0')
              PHP_TOTAL=$([ -f /tmp/php-total ] && cat /tmp/php-total || echo '0')
              PHP_DISPLAY=$([ "$PHP_STATUS" = "running" ] && echo "running ($PHP_COMPLETED/$PHP_TOTAL)" || echo "$PHP_STATUS")

              PLAYWRIGHT_STATUS=$([ -f /tmp/playwright-result ] && cat /tmp/playwright-result || echo 'running')
              PLAYWRIGHT_COMPLETED=$([ -f /tmp/playwright-completed ] && cat /tmp/playwright-completed || echo '0')
              PLAYWRIGHT_TOTAL=$([ -f /tmp/playwright-total ] && cat /tmp/playwright-total || echo '0')
              # Cap completed at total for display (symbol counting can double-count at end)
              if [ "$PLAYWRIGHT_STATUS" = "running" ]; then
                if [ "$PLAYWRIGHT_TOTAL" -gt 0 ] && [ "$PLAYWRIGHT_COMPLETED" -gt "$PLAYWRIGHT_TOTAL" ]; then
                  PLAYWRIGHT_DISPLAY="running ($PLAYWRIGHT_TOTAL/$PLAYWRIGHT_TOTAL)"
                else
                  PLAYWRIGHT_DISPLAY="running ($PLAYWRIGHT_COMPLETED/$PLAYWRIGHT_TOTAL)"
                fi
              else
                PLAYWRIGHT_DISPLAY="$PLAYWRIGHT_STATUS"
              fi

              echo "[${elapsed_min}m] iznik-batch: $LARAVEL_DISPLAY | Go: $GO_DISPLAY | iznik-server: $PHP_DISPLAY | Playwright: $PLAYWRIGHT_DISPLAY"

              # Check for any failures (fail-fast)
              if [ "$LARAVEL_STATUS" = "fail" ]; then
                echo "❌ FAIL-FAST: iznik-batch tests failed - stopping all tests"
                kill $GO_PID $PHPUNIT_PID $PLAYWRIGHT_PID 2>/dev/null || true
                TESTS_KILLED_EARLY=true
                break
              fi
              if [ "$GO_STATUS" = "fail" ]; then
                echo "❌ FAIL-FAST: Go tests failed - stopping all tests"
                kill $LARAVEL_PID $PHPUNIT_PID $PLAYWRIGHT_PID 2>/dev/null || true
                TESTS_KILLED_EARLY=true
                break
              fi
              if [ "$PHP_STATUS" = "fail" ]; then
                echo "❌ FAIL-FAST: iznik-server tests failed - stopping all tests"
                kill $LARAVEL_PID $GO_PID $PLAYWRIGHT_PID 2>/dev/null || true
                TESTS_KILLED_EARLY=true
                break
              fi
              if [ "$PLAYWRIGHT_STATUS" = "fail" ]; then
                echo "❌ FAIL-FAST: Playwright tests failed - stopping all tests"
                kill $LARAVEL_PID $GO_PID $PHPUNIT_PID 2>/dev/null || true
                TESTS_KILLED_EARLY=true
                break
              fi

              # Check if all tests completed
              if [ "$LARAVEL_STATUS" != "running" ] && [ "$GO_STATUS" != "running" ] && [ "$PHP_STATUS" != "running" ] && [ "$PLAYWRIGHT_STATUS" != "running" ]; then
                echo "✅ All tests completed"
                break
              fi

              sleep 10
            done

            # Wait for all background processes to finish
            wait $LARAVEL_PID 2>/dev/null || true
            wait $GO_PID 2>/dev/null || true
            wait $PHPUNIT_PID 2>/dev/null || true
            wait $PLAYWRIGHT_PID 2>/dev/null || true

            # For killed tests, the background subshell was terminated before it could
            # write logs to the output file. Fetch and append logs from the status API.
            if [ "$TESTS_KILLED_EARLY" = "true" ]; then
              echo "📋 Capturing final logs for killed tests..."
              for test_type in laravel go php playwright; do
                outfile=""
                case $test_type in
                  laravel) outfile=~/test-output/laravel.out ;;
                  go) outfile=~/test-output/go.out ;;
                  php) outfile=~/test-output/phpunit.out ;;
                  playwright) outfile=~/test-output/playwright.out ;;
                esac
                result=$(cat /tmp/${test_type}-result 2>/dev/null || echo "unknown")
                if [ "$result" = "running" ] || [ "$result" = "unknown" ]; then
                  echo "📋 Fetching final logs for $test_type..."
                  status_response=$(curl -s http://localhost:${PORT_STATUS:-8081}/api/tests/${test_type}/status || echo '{}')
                  echo "" >> "$outfile"
                  echo "=== Test killed by fail-fast ===" >> "$outfile"
                  echo "$status_response" | jq -r '.logs // "No logs available"' >> "$outfile" 2>/dev/null || true
                fi
              done
            fi

            # Check results from files
            LARAVEL_RESULT=$(cat /tmp/laravel-result 2>/dev/null || echo "fail")
            GO_RESULT=$(cat /tmp/go-result 2>/dev/null || echo "fail")
            PHP_RESULT=$(cat /tmp/php-result 2>/dev/null || echo "fail")
            PLAYWRIGHT_RESULT=$(cat /tmp/playwright-result 2>/dev/null || echo "fail")

            # Handle killed or never-started tests
            for varname in LARAVEL_RESULT GO_RESULT PHP_RESULT PLAYWRIGHT_RESULT; do
              val="${!varname}"
              if [ "$TESTS_KILLED_EARLY" = "true" ] && [ "$val" = "running" ]; then
                eval "$varname=killed"
              elif [ "$val" = "pending" ]; then
                echo "⚠️ $varname was never started (still 'pending')"
                eval "$varname=fail"
              fi
            done

            echo ""
            echo "=== Parallel Test Results ==="
            echo "iznik-batch: $LARAVEL_RESULT"
            echo "Go: $GO_RESULT"
            echo "iznik-server: $PHP_RESULT"
            echo "Playwright: $PLAYWRIGHT_RESULT"

            # Set environment variables for later steps
            if [ "$LARAVEL_RESULT" = "pass" ]; then
              echo "LARAVEL_TESTS_PASSED=true" >> $BASH_ENV
            else
              echo "LARAVEL_TESTS_PASSED=false" >> $BASH_ENV
            fi

            if [ "$GO_RESULT" = "pass" ]; then
              echo "GO_TESTS_PASSED=true" >> $BASH_ENV
            else
              echo "GO_TESTS_PASSED=false" >> $BASH_ENV
            fi

            if [ "$PHP_RESULT" = "pass" ]; then
              echo "PHP_TESTS_PASSED=true" >> $BASH_ENV
            else
              echo "PHP_TESTS_PASSED=false" >> $BASH_ENV
            fi

            if [ "$PLAYWRIGHT_RESULT" = "pass" ]; then
              echo "PLAYWRIGHT_TESTS_PASSED=true" >> $BASH_ENV
            else
              echo "PLAYWRIGHT_TESTS_PASSED=false" >> $BASH_ENV
            fi

            # === WATCHDOG CLEANUP ===
            # Kill the watchdog since tests completed (either pass or fail)
            if [ -f /tmp/watchdog-pid ]; then
              WATCHDOG_PID=$(cat /tmp/watchdog-pid)
              kill $WATCHDOG_PID 2>/dev/null || true
              echo "🛑 Watchdog timer stopped"
            fi

            # Check if we hit the watchdog timeout
            if [ -f /tmp/watchdog-triggered ]; then
              echo ""
              echo "⏰ =============================================="
              echo "⏰ TESTS TERMINATED BY WATCHDOG TIMEOUT"
              echo "⏰ The overall job timeout (48 min) was reached."
              echo "⏰ This may indicate tests are hanging or too slow."
              echo "⏰ Artifacts will be collected for debugging."
              echo "⏰ =============================================="
              echo ""
              # Don't exit 1 here - let artifacts be collected
              # The test results will show as failed anyway
            fi

            # Check test suite results
            if [ "$LARAVEL_RESULT" != "pass" ] || [ "$GO_RESULT" != "pass" ] || [ "$PHP_RESULT" != "pass" ] || [ "$PLAYWRIGHT_RESULT" != "pass" ]; then
              echo "❌ One or more test suites failed"
              # Show failed test output files
              echo ""
              echo "=== Test Output Files ==="
              for f in ~/test-output/*.out; do
                if [ -f "$f" ]; then
                  echo "📄 $f: $(wc -l < "$f") lines"
                fi
              done
              # Don't exit 1 here - let artifacts be collected
              # The "Evaluate overall test results" step (with when: always) will handle the failure exit
            else
              echo "✅ All tests passed!"
            fi
          no_output_timeout: 50m

      - store_artifacts:
          path: ~/test-output
          destination: test-output

      # Upload coverage — split into small steps to stay under CircleCI's 2048-char limit.
      - run:
          name: Setup coverage tools
          when: always
          command: |
            if [ -z "${COVERALLS_REPO_TOKEN:-}" ]; then
              echo "⚠️ COVERALLS_REPO_TOKEN not set - skipping"
              echo "export SKIP_COVERAGE=true" >> $BASH_ENV
              exit 0
            fi
            npm install -g coveralls 2>/dev/null || sudo npm install -g coveralls 2>/dev/null || true
            if [ -d ./.git ]; then echo "export COV_ROOT=$(pwd)" >> $BASH_ENV
            elif [ -d ~/project/.git ]; then echo "export COV_ROOT=~/project" >> $BASH_ENV
            elif [ -d ~/FreegleDocker/.git ]; then echo "export COV_ROOT=~/FreegleDocker" >> $BASH_ENV
            else echo "export SKIP_COVERAGE=true" >> $BASH_ENV; fi
            echo "export COVERALLS_SERVICE_NAME=circleci" >> $BASH_ENV
            echo "export COVERALLS_SERVICE_JOB_ID=${CIRCLE_BUILD_NUM}" >> $BASH_ENV
            echo "export COVERALLS_SERVICE_NUMBER=${CIRCLE_BUILD_NUM}" >> $BASH_ENV
            echo "export COVERALLS_PARALLEL=true" >> $BASH_ENV
            echo "export COV_UPLOADS=0" >> $BASH_ENV

      - run:
          name: Upload Go coverage
          when: always
          command: |
            [ "${SKIP_COVERAGE:-}" = "true" ] && exit 0
            echo "=== Go Coverage ==="
            GO_DIR="$COV_ROOT/iznik-server-go"
            docker cp ${COMPOSE_PROJECT_NAME:-freegle}-apiv2:/app/coverage.out "$GO_DIR/coverage.out" 2>/dev/null || { echo "⚠️ Not found"; exit 0; }
            echo "✅ Found Go coverage"
            docker exec ${COMPOSE_PROJECT_NAME:-freegle}-apiv2 sh -c 'cd /app && go install github.com/jandelgado/gcov2lcov@latest 2>/dev/null && ~/go/bin/gcov2lcov -infile=coverage.out -outfile=coverage.lcov' 2>&1 || { echo "⚠️ Convert failed"; exit 0; }
            docker cp ${COMPOSE_PROJECT_NAME:-freegle}-apiv2:/app/coverage.lcov "$GO_DIR/coverage.lcov" 2>/dev/null
            sed -i 's|^SF:/app/|SF:iznik-server-go/|' "$GO_DIR/coverage.lcov"
            cd "$COV_ROOT" && export COVERALLS_FLAG_NAME="go"
            cat "$GO_DIR/coverage.lcov" | coveralls && echo "✅ Uploaded" && echo "export COV_UPLOADS=$((COV_UPLOADS + 1))" >> $BASH_ENV || echo "⚠️ Upload failed"
            rm -f "$GO_DIR/coverage.out" "$GO_DIR/coverage.lcov"

      - run:
          name: Upload Laravel coverage
          when: always
          command: |
            [ "${SKIP_COVERAGE:-}" = "true" ] && exit 0
            echo "=== Laravel Coverage ==="
            docker cp ${COMPOSE_PROJECT_NAME:-freegle}-batch:/tmp/laravel-coverage.xml /tmp/lc.xml 2>/dev/null || { echo "⚠️ Not found"; exit 0; }
            echo "✅ Found Laravel coverage"
            python3 -c "
            import xml.etree.ElementTree as ET, sys
            for f in ET.parse(sys.argv[1]).getroot().iter('file'):
                n=f.get('name','')
                r='iznik-batch/'+n.split('/var/www/html/')[-1] if '/var/www/html/' in n else n
                print('SF:'+r)
                [print('DA:'+l.get('num')+','+l.get('count')) for l in f.iter('line') if l.get('num') and l.get('count') is not None]
                print('end_of_record')
            " /tmp/lc.xml > /tmp/lc.lcov 2>&1
            [ -s /tmp/lc.lcov ] || { echo "⚠️ Conversion failed"; exit 0; }
            echo "✅ Converted ($(wc -l < /tmp/lc.lcov) lines)"
            cd "$COV_ROOT" && export COVERALLS_FLAG_NAME="laravel"
            cat /tmp/lc.lcov | coveralls && echo "✅ Uploaded" && echo "export COV_UPLOADS=$((COV_UPLOADS + 1))" >> $BASH_ENV || echo "⚠️ Upload failed"

      - run:
          name: Upload Vitest coverage
          when: always
          command: |
            [ "${SKIP_COVERAGE:-}" = "true" ] && exit 0
            echo "=== Vitest Coverage ==="
            VL=""
            [ -f "./iznik-nuxt3/coverage/lcov.info" ] && VL="./iznik-nuxt3/coverage/lcov.info"
            [ -f "$HOME/FreegleDocker/iznik-nuxt3/coverage/lcov.info" ] && VL="$HOME/FreegleDocker/iznik-nuxt3/coverage/lcov.info"
            [ -f "$HOME/project/iznik-nuxt3/coverage/lcov.info" ] && VL="$HOME/project/iznik-nuxt3/coverage/lcov.info"
            [ -z "$VL" ] && echo "⚠️ Not found" && exit 0
            echo "✅ Found at $VL"
            sed 's|^SF:|SF:iznik-nuxt3/|' "$VL" > /tmp/vl.lcov
            cd "$COV_ROOT" && export COVERALLS_FLAG_NAME="vitest"
            cat /tmp/vl.lcov | coveralls && echo "✅ Uploaded" && echo "export COV_UPLOADS=$((COV_UPLOADS + 1))" >> $BASH_ENV || echo "⚠️ Upload failed"

      - run:
          name: Upload Playwright coverage
          when: always
          command: |
            [ "${SKIP_COVERAGE:-}" = "true" ] && exit 0
            echo "=== Playwright Coverage ==="
            PL=""
            docker cp ${COMPOSE_PROJECT_NAME:-freegle}-playwright:/app/monocart-report/coverage/lcov.info /tmp/pl.lcov 2>/dev/null && PL="/tmp/pl.lcov" && echo "✅ Found (monocart)"
            [ -z "$PL" ] && docker cp ${COMPOSE_PROJECT_NAME:-freegle}-playwright:/app/coverage/lcov.info /tmp/pl.lcov 2>/dev/null && PL="/tmp/pl.lcov" && echo "✅ Found"
            [ -z "$PL" ] && echo "⚠️ Not found" && exit 0
            sed 's|^SF:|SF:iznik-nuxt3/|' "$PL" > /tmp/pl-fixed.lcov
            cd "$COV_ROOT" && export COVERALLS_FLAG_NAME="playwright"
            cat /tmp/pl-fixed.lcov | coveralls && echo "✅ Uploaded" && echo "export COV_UPLOADS=$((COV_UPLOADS + 1))" >> $BASH_ENV || echo "⚠️ Upload failed"

      - run:
          name: Coveralls webhook
          when: always
          command: |
            [ "${SKIP_COVERAGE:-}" = "true" ] && exit 0
            if [ "${COV_UPLOADS:-0}" -gt 0 ]; then
              # Carry forward master's last-known coverage for any suite flags not
              # uploaded in this build. Feature branches skip test suites whose
              # subtree wasn't touched (SKIP_GO/SKIP_LARAVEL/SKIP_VITEST/SKIP_PLAYWRIGHT),
              # so their Coveralls flag files are absent — without carryforward,
              # Coveralls compares partial-branch coverage against master's full
              # coverage and reports a large false "coverage dropped" regression
              # (seen as a -7.1% drop on Nuxt-only PRs that skip Go+Laravel).
              # carryforward only fills flags MISSING from this build; uploaded
              # flags keep their fresh PR coverage.
              echo "📊 Uploaded $COV_UPLOADS reports. Sending webhook (carryforward=go,laravel,vitest,playwright)..."
              curl -sf -X POST "https://coveralls.io/webhook?repo_token=${COVERALLS_REPO_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"payload\":{\"build_num\":\"${CIRCLE_BUILD_NUM}\",\"status\":\"done\",\"carryforward\":\"go,laravel,vitest,playwright\"}}" \
                && echo "✅ Webhook sent" || echo "⚠️ Webhook failed"
            else echo "⚠️ No coverage uploaded"; fi

      - collect-artifacts

      - run:
          name: Evaluate overall test results
          command: |
            # Disable pipefail to prevent SIGPIPE from grep|head killing the step
            set +o pipefail
            echo "=== Overall Test Results ==="

            # All tests (required)
            if [ "$LARAVEL_TESTS_PASSED" = "true" ] && [ "$GO_TESTS_PASSED" = "true" ] && [ "$PHP_TESTS_PASSED" = "true" ] && [ "$PLAYWRIGHT_TESTS_PASSED" = "true" ]; then
              echo "✅ All tests passed successfully!"
              echo "ALL_TESTS_PASSED=true" >> $BASH_ENV
            else
              echo "❌ Tests failed"
              echo "Laravel: $LARAVEL_TESTS_PASSED, Go: $GO_TESTS_PASSED, PHP: $PHP_TESTS_PASSED, Playwright: $PLAYWRIGHT_TESTS_PASSED"
              echo ""

              # Extract and display failure details from test output files
              # This ensures failures are visible even if earlier output was truncated

              if [ "$LARAVEL_TESTS_PASSED" != "true" ] && [ -f ~/test-output/laravel.out ]; then
                echo "=== Laravel (iznik-batch) Failure Details ==="
                # Show PHPUnit failure summary (lines after "There were X failures:")
                if grep -q "There were .* failures" ~/test-output/laravel.out; then
                  grep -A 100 "There were .* failures" ~/test-output/laravel.out | head -80
                else
                  # Show last 50 lines if no standard failure marker
                  echo "(Showing last 50 lines of output)"
                  tail -50 ~/test-output/laravel.out
                fi
                echo ""
              fi

              if [ "$GO_TESTS_PASSED" != "true" ] && [ -f ~/test-output/go.out ]; then
                echo "=== Go Test Failure Details ==="
                # Show lines containing FAIL or error
                if grep -q "FAIL\|Error\|panic" ~/test-output/go.out; then
                  grep -B 2 -A 5 "FAIL\|Error\|panic" ~/test-output/go.out | head -60
                else
                  echo "(Showing last 50 lines of output)"
                  tail -50 ~/test-output/go.out
                fi
                echo ""
              fi

              if [ "$PHP_TESTS_PASSED" != "true" ] && [ -f ~/test-output/php.out ]; then
                echo "=== PHP (iznik-server) Failure Details ==="
                if grep -q "FAILURES\|There were .* failures" ~/test-output/php.out; then
                  grep -A 100 "There were .* failures" ~/test-output/php.out | head -80
                else
                  echo "(Showing last 50 lines of output)"
                  tail -50 ~/test-output/php.out
                fi
                echo ""
              fi

              if [ "$PLAYWRIGHT_TESTS_PASSED" != "true" ] && [ -f ~/test-output/playwright.out ]; then
                echo "=== Playwright Failure Details ==="
                # Show lines containing failure markers
                if grep -q "✘\|Error:\|failed" ~/test-output/playwright.out; then
                  grep -B 2 -A 10 "✘\|Error:\|failed" ~/test-output/playwright.out | head -60
                else
                  echo "(Showing last 50 lines of output)"
                  tail -50 ~/test-output/playwright.out
                fi
                echo ""
              fi

              echo "=== Full logs available in artifacts ==="
              echo "Download test-output/*.out files for complete details"
              exit 1
            fi
          when: always

      - run:
          name: Auto-merge master to production
          command: |
            if [ "$ALL_TESTS_PASSED" != "true" ]; then
              echo "Skipping auto-merge: not all tests passed"
              exit 0
            fi

            if [ "$CIRCLE_BRANCH" != "master" ]; then
              echo "Skipping auto-merge: not on master branch"
              exit 0
            fi

            echo "Auto-merging master to production..."
            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
            git config --global user.email "circleci@freegle.org"
            git config --global user.name "CircleCI Auto-merge"
            git fetch origin production:production
            git checkout production
            MASTER_COMMIT_MSG=$(git log master -1 --pretty=%B | head -n 1)
            if git merge master -m "Auto-merge master to production - $MASTER_COMMIT_MSG"; then
              git push origin production || { echo "Push failed"; exit 1; }
            else
              echo "Merge conflicts"; git merge --abort; exit 1
            fi

  # === App Build Jobs ===

  increment-version:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Increment Version Number
          command: |
            CURRENT_VERSION="${CURRENT_VERSION:-3.2.37}"
            echo "Current version: $CURRENT_VERSION"
            major=$(echo "$CURRENT_VERSION" | cut -d. -f1)
            minor=$(echo "$CURRENT_VERSION" | cut -d. -f2)
            patch=$(echo "$CURRENT_VERSION" | cut -d. -f3)
            NEW_PATCH=$((patch + 1))
            NEW_VERSION="$major.$minor.$NEW_PATCH"
            echo "New version: $NEW_VERSION"
            echo "$NEW_VERSION" > .new_version
            cat .new_version
      - persist_to_workspace:
          root: .
          paths:
            - .new_version

  build-android-debug:
    executor: android-executor
    working_directory: ~/project/iznik-nuxt3
    steps:
      - checkout:
          path: ~/project
      - run:
          name: Install Node.js 22
          command: |
            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
            sudo apt-get install -y nodejs
          max_auto_reruns: 3
          auto_rerun_delay: 10s
      - run:
          name: Verify Node.js and npm versions
          command: |
            node --version
            npm --version
      - restore_cache:
          keys:
            - npm-deps-v1-{{ checksum "package-lock.json" }}
            - npm-deps-v1-
      - run:
          name: Install Node.js Dependencies
          command: npm ci
          max_auto_reruns: 3
          auto_rerun_delay: 10s
      - save_cache:
          key: npm-deps-v1-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run:
          name: Build Nuxt App (Debug)
          command: |
            export NODE_OPTIONS="--max-old-space-size=3584"
            export ISAPP=true
            export APP_ENV=development
            export TUS_UPLOADER=https://uploads.ilovefreegle.org:8080
            export IMAGE_DELIVERY=https://delivery.ilovefreegle.org
            echo "🔧 Building debug version for master branch"
            npm run generate
      - run:
          name: Setup Firebase Configuration
          command: |
            if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
              echo "Decoding google-services.json from environment variable"
              echo "$GOOGLE_SERVICES_JSON_BASE64" | tr -d '\n' | base64 -d > android/app/google-services.json
              if [ -f android/app/google-services.json ]; then
                FILE_SIZE=$(wc -c < android/app/google-services.json)
                echo "✅ File created: $FILE_SIZE bytes"
                if python3 -m json.tool android/app/google-services.json > /dev/null 2>&1; then
                  echo "✅ Valid JSON structure"
                  echo "📱 Project ID: $(python3 -c "import json; print(json.load(open('android/app/google-services.json'))['project_info']['project_id'])")"
                else
                  echo "❌ ERROR: Invalid JSON - Firebase will not work!"
                  exit 1
                fi
              else
                echo "❌ ERROR: File was not created!"
                exit 1
              fi
            else
              echo "⚠️  GOOGLE_SERVICES_JSON_BASE64 not set - Push notifications will not work"
            fi
      - run:
          name: Sync Capacitor to Android
          command: npx cap sync android
      - run:
          name: Make gradlew executable
          command: chmod +x android/gradlew
      - run:
          name: Create Debug Keystore
          command: |
            mkdir -p ~/.android
            if [ ! -f ~/.android/debug.keystore ]; then
              echo "Creating debug keystore..."
              keytool -genkey -v \
                -keystore ~/.android/debug.keystore \
                -storepass android \
                -alias androiddebugkey \
                -keypass android \
                -keyalg RSA \
                -keysize 2048 \
                -validity 10000 \
                -dname "CN=Android Debug,O=Android,C=US"
              echo "✅ Debug keystore created"
            else
              echo "✅ Debug keystore already exists"
            fi
      - run:
          name: Build Debug APK
          command: |
            cd android
            ./gradlew assembleDebug --stacktrace
            echo "✅ Debug APK built successfully"
            echo ""
            echo "📋 APK Info:"
            ls -lh app/build/outputs/apk/debug/
      - store_artifacts:
          path: android/app/build/outputs/apk/debug/app-debug.apk
          destination: freegle-debug.apk
      - run:
          name: Build Complete
          command: |
            echo "🎉 Debug build complete!"
            echo "📱 Download APK from CircleCI artifacts tab"

  build-android:
    executor: android-executor
    working_directory: ~/project/iznik-nuxt3
    steps:
      - checkout:
          path: ~/project
      - attach_workspace:
          at: .
      - run:
          name: Install Node.js 22
          command: |
            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
            sudo apt-get install -y nodejs
          max_auto_reruns: 3
          auto_rerun_delay: 10s
      - run:
          name: Verify Node.js and npm versions
          command: |
            node --version
            npm --version
      - restore_cache:
          keys:
            - npm-deps-v1-{{ checksum "package-lock.json" }}
            - npm-deps-v1-
      - run:
          name: Install Node.js Dependencies
          command: npm ci
          max_auto_reruns: 3
          auto_rerun_delay: 10s
      - save_cache:
          key: npm-deps-v1-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run:
          name: Update Mobile Version in config.js
          command: |
            if [ ! -f .new_version ]; then
              echo "❌ ERROR: Version file not found at .new_version"
              exit 1
            fi
            NEW_VERSION=$(cat .new_version)
            echo "📱 Using version from workspace: $NEW_VERSION"
            if ! echo "$NEW_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "❌ ERROR: Invalid version format '$NEW_VERSION'. Expected format: X.Y.Z"
              exit 1
            fi
            sed -i "s/MOBILE_VERSION: '[0-9]*\.[0-9]*\.[0-9]*'/MOBILE_VERSION: '$NEW_VERSION'/" config.js
            if grep -q "MOBILE_VERSION: '$NEW_VERSION'" config.js; then
              echo "✅ Successfully updated config.js with version $NEW_VERSION"
              grep "MOBILE_VERSION:" config.js
            else
              echo "❌ ERROR: Failed to update config.js"
              exit 1
            fi
      - run:
          name: Build Nuxt App
          command: |
            export NODE_OPTIONS="--max-old-space-size=3584"
            export ISAPP=true
            export APP_ENV=production
            export TUS_UPLOADER=https://uploads.ilovefreegle.org:8080
            export IMAGE_DELIVERY=https://delivery.ilovefreegle.org
            if [ -n "$SENTRY_DSN_APP_FD" ]; then
              export SENTRY_DSN="$SENTRY_DSN_APP_FD"
              echo "✅ Using app-specific Sentry DSN for error tracking"
            else
              echo "⚠️  SENTRY_DSN_APP_FD not set - app will use default Sentry DSN"
            fi
            npm run generate
      - run:
          name: Setup Firebase Configuration
          command: |
            if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
              echo "Decoding google-services.json from environment variable"
              echo "$GOOGLE_SERVICES_JSON_BASE64" | tr -d '\n' | base64 -d > android/app/google-services.json
              if [ -f android/app/google-services.json ]; then
                FILE_SIZE=$(wc -c < android/app/google-services.json)
                echo "✅ File created: $FILE_SIZE bytes"
                if python3 -m json.tool android/app/google-services.json > /dev/null 2>&1; then
                  echo "✅ Valid JSON structure"
                  echo "📱 Project ID: $(python3 -c "import json; print(json.load(open('android/app/google-services.json'))['project_info']['project_id'])")"
                else
                  echo "❌ ERROR: Invalid JSON - Firebase will not work!"
                  exit 1
                fi
              else
                echo "❌ ERROR: File was not created!"
                exit 1
              fi
            else
              echo "⚠️  GOOGLE_SERVICES_JSON_BASE64 not set - Push notifications will not work"
            fi
      - run:
          name: Sync Capacitor to Android
          command: npx cap sync android
      - run:
          name: Make gradlew executable
          command: chmod +x android/gradlew
      - restore_cache:
          keys:
            - bundle-v1-{{ checksum "Gemfile.lock" }}
            - bundle-v1-
      - setup-android-fastlane
      - save_cache:
          key: bundle-v1-{{ checksum "Gemfile.lock" }}
          paths:
            - vendor/bundle
      - run:
          name: Build and Deploy to Google Play Beta Track
          command: bundle exec fastlane android beta
      - run:
          name: Update CircleCI Version Variable
          command: |
            if [ ! -f .new_version ]; then
              echo "⚠️  .new_version file not found - skipping version update"
              exit 0
            fi
            NEW_VERSION=$(cat .new_version)
            echo "📝 Updating CircleCI CURRENT_VERSION to: ${NEW_VERSION}"
            curl -X DELETE \
              -H "Circle-Token: ${CIRCLECI_API_TOKEN}" \
              "https://circleci.com/api/v2/project/gh/Freegle/Iznik/envvar/CURRENT_VERSION"
            curl -X POST \
              -H "Circle-Token: ${CIRCLECI_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"CURRENT_VERSION\",\"value\":\"${NEW_VERSION}\"}" \
              "https://circleci.com/api/v2/project/gh/Freegle/Iznik/envvar"
            echo "✅ Updated CURRENT_VERSION to ${NEW_VERSION}"
      - store_artifacts:
          path: android/app/build/outputs/bundle/release/
          destination: android-bundle
      - store_artifacts:
          path: android/app/build/outputs/apk/release/
          destination: android-apk

  build-ios:
    executor: macos-executor
    working_directory: ~/project/iznik-nuxt3
    steps:
      - checkout:
          path: ~/project
      - attach_workspace:
          at: .
      - run:
          name: Install Node.js 22
          command: |
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.0/install.sh | bash
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 22
            nvm use 22
            nvm alias default 22
            echo 'export NVM_DIR="$HOME/.nvm"' >> $BASH_ENV
            echo '[ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"' >> $BASH_ENV
          max_auto_reruns: 3
          auto_rerun_delay: 10s
      - run:
          name: Verify Node.js and npm versions
          command: |
            node --version
            npm --version
      - run:
          name: Install Node.js Dependencies
          command: |
            npm ci
            npm install @rollup/rollup-darwin-arm64 @oxc-parser/binding-darwin-arm64 @oxc-transform/binding-darwin-arm64 @oxc-minify/binding-darwin-arm64 --prefer-offline || true
          max_auto_reruns: 3
          auto_rerun_delay: 10s
      - run:
          name: Update Mobile Version in config.js
          command: |
            if [ ! -f .new_version ]; then
              echo "❌ ERROR: Version file not found at .new_version"
              exit 1
            fi
            NEW_VERSION=$(cat .new_version)
            echo "📱 Using version from workspace: $NEW_VERSION"
            if ! echo "$NEW_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "❌ ERROR: Invalid version format '$NEW_VERSION'. Expected format: X.Y.Z"
              exit 1
            fi
            sed -i '' "s/MOBILE_VERSION: '[0-9]*\.[0-9]*\.[0-9]*'/MOBILE_VERSION: '$NEW_VERSION'/" config.js
            if grep -q "MOBILE_VERSION: '$NEW_VERSION'" config.js; then
              echo "✅ Successfully updated config.js with version $NEW_VERSION"
              grep "MOBILE_VERSION:" config.js
            else
              echo "❌ ERROR: Failed to update config.js"
              exit 1
            fi
      - run:
          name: Build Nuxt App
          command: |
            export NODE_OPTIONS="--max-old-space-size=3584"
            export ISAPP=true
            export APP_ENV=production
            export TUS_UPLOADER=https://uploads.ilovefreegle.org:8080
            export IMAGE_DELIVERY=https://delivery.ilovefreegle.org
            if [ -n "$SENTRY_DSN_APP_FD" ]; then
              export SENTRY_DSN="$SENTRY_DSN_APP_FD"
              echo "✅ Using app-specific Sentry DSN for error tracking"
            else
              echo "⚠️  SENTRY_DSN_APP_FD not set - app will use default Sentry DSN"
            fi
            npm run generate
      - run:
          name: Sync Capacitor to iOS
          command: npx cap sync ios
      - run:
          name: Setup Firebase Configuration for iOS
          command: |
            if [ -n "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
              echo "Decoding GoogleService-Info.plist from environment variable"
              echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | tr -d '\n' | base64 --decode > ios/App/App/GoogleService-Info.plist
              if [ -f ios/App/App/GoogleService-Info.plist ]; then
                echo "✅ GoogleService-Info.plist successfully created"
                ls -lh ios/App/App/GoogleService-Info.plist
              else
                echo "❌ Failed to create GoogleService-Info.plist"
                exit 1
              fi
            else
              echo "❌ GOOGLE_SERVICE_INFO_PLIST_BASE64 environment variable not set"
              exit 1
            fi
      - run:
          name: Install Fastlane
          command: |
            bundle config set --local path 'vendor/bundle'
            bundle update fastlane
            bundle install
          max_auto_reruns: 3
          auto_rerun_delay: 10s
      - run:
          name: Setup iOS Certificates
          command: |
            mkdir -p ~/certificates
            echo "$IOS_DISTRIBUTION_CERT" | tr -d '\n' | base64 --decode > ~/certificates/ios_distribution.p12
            echo "$IOS_PROVISIONING_PROFILE" | tr -d '\n' | base64 --decode > ~/certificates/ios_appstore.mobileprovision
            KEYCHAIN_PATH=~/Library/Keychains/temp.keychain-db
            KEYCHAIN_PASSWORD=circleci
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security default-keychain -s "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
            echo "export IOS_CERTIFICATE_PATH=~/certificates/ios_distribution.p12" >> $BASH_ENV
            echo "export IOS_PROVISIONING_PROFILE_PATH=~/certificates/ios_appstore.mobileprovision" >> $BASH_ENV
            echo "export KEYCHAIN_NAME=$KEYCHAIN_PATH" >> $BASH_ENV
            echo "export KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $BASH_ENV
      - run:
          name: Build and Deploy to TestFlight
          command: |
            export TERM=xterm-256color
            bundle exec fastlane ios beta
          no_output_timeout: 30m
      - run:
          name: Update CircleCI Version Variable
          command: |
            if [ ! -f .new_version ]; then
              echo "⚠️  .new_version file not found - skipping version update"
              exit 0
            fi
            NEW_VERSION=$(cat .new_version)
            echo "📝 Updating CircleCI CURRENT_VERSION to: ${NEW_VERSION}"
            curl -X DELETE \
              -H "Circle-Token: ${CIRCLECI_API_TOKEN}" \
              "https://circleci.com/api/v2/project/gh/Freegle/Iznik/envvar/CURRENT_VERSION"
            curl -X POST \
              -H "Circle-Token: ${CIRCLECI_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"CURRENT_VERSION\",\"value\":\"${NEW_VERSION}\"}" \
              "https://circleci.com/api/v2/project/gh/Freegle/Iznik/envvar"
            echo "✅ Updated CURRENT_VERSION to ${NEW_VERSION}"
      - store_artifacts:
          path: build/
          destination: ios-build

