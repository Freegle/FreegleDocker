  check-hotfix-promote:
    docker:
      - image: cimg/base:stable
    working_directory: ~/project/iznik-nuxt3
    steps:
      - checkout:
          path: ~/project
      - run:
          name: Check for Hotfix Commit
          command: |
            # Get the commit message
            COMMIT_MSG=$(git -C ~/project log -1 --format=%s)
            echo "Commit message: $COMMIT_MSG"

            # Check for hotfix: prefix (case-insensitive)
            if echo "$COMMIT_MSG" | grep -qi "^hotfix:"; then
              echo "HOTFIX DETECTED: $COMMIT_MSG"
              echo "Triggering immediate production promotion..."

              curl -X POST \
                -H "Circle-Token: ${CIRCLECI_API_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{"branch":"production","parameters":{"run_manual_promote":true}}' \
                "https://circleci.com/api/v2/project/gh/Freegle/Iznik/pipeline"

              echo "Promotion workflow triggered"
            else
              echo "Normal commit (no hotfix: prefix)"
              echo "Beta builds deployed. Production promotion will happen on Wednesday night."
            fi

  build-android-dev:
    executor: android-executor
    working_directory: ~/project/iznik-nuxt3
    steps:
      - checkout:
          path: ~/project
      - run:
          name: Install Node.js 22
          command: |
            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
            sudo apt-get install -y nodejs
          max_auto_reruns: 3
          auto_rerun_delay: 10s
      - run:
          name: Verify Node.js and npm versions
          command: |
            node --version
            npm --version
      - restore_cache:
          keys:
            - npm-deps-v1-{{ checksum "package-lock.json" }}
            - npm-deps-v1-
      - run:
          name: Install Node.js Dependencies
          command: |
            npm ci
            npm update @freegle/capacitor-push-notifications-cap7
          max_auto_reruns: 3
          auto_rerun_delay: 10s
      - save_cache:
          key: npm-deps-v1-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run:
          name: Setup Dev App Web Content
          command: |
            echo "Setting up minimal dev app (connection screen only)"
            BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            sed -i "s|</body>|<p style=\"text-align:center;font-size:11px;color:#999;margin-top:20px;\">Build: ${BUILD_TIME}</p></body>|" dev-app/index.html
            ls -la dev-app/
      - run:
          name: Sync Capacitor to Android (Dev)
          command: |
            rm -f capacitor.config.ts
            cp capacitor.config.dev.js capacitor.config.js
            npx cap sync android
      - run:
          name: Setup Firebase Configuration
          command: |
            if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
              echo "$GOOGLE_SERVICES_JSON_BASE64" | tr -d '\n' | base64 -d > android/app/google-services.json
            else
              echo "GOOGLE_SERVICES_JSON_BASE64 not set - Push notifications will not work"
            fi
      - run:
          name: Configure Dev App Identity
          command: |
            sed -i 's/org\.ilovefreegle\.direct/org.ilovefreegle.dev/g' android/app/build.gradle
            sed -i 's/>Freegle</>Freegle Dev</g' android/app/src/main/res/values/strings.xml
            if [ -f capacitor.config.json ]; then
              sed -i 's/org\.ilovefreegle\.direct/org.ilovefreegle.dev/g' capacitor.config.json
              sed -i 's/"appName": "Freegle"/"appName": "Freegle Dev"/g' capacitor.config.json
            fi
      - run:
          name: Install ImageMagick
          command: sudo apt-get update && sudo apt-get install -y imagemagick
          max_auto_reruns: 3
          auto_rerun_delay: 10s
      - run:
          name: Create Greyscale Icons (Dev)
          command: |
            find android/app/src/main/res -name "ic_launcher*.png" -type f | while read icon; do
              convert "$icon" -colorspace Gray "$icon"
            done
      - run:
          name: Enable HTTP for Dev Servers
          command: |
            mkdir -p android/app/src/main/res/xml
            printf '%s\n' \
              '<?xml version="1.0" encoding="utf-8"?>' \
              '<network-security-config>' \
              '    <base-config cleartextTrafficPermitted="true">' \
              '        <trust-anchors>' \
              '            <certificates src="system" />' \
              '        </trust-anchors>' \
              '    </base-config>' \
              '</network-security-config>' > android/app/src/main/res/xml/network_security_config.xml
            if ! grep -q 'networkSecurityConfig' android/app/src/main/AndroidManifest.xml; then
              sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/g' android/app/src/main/AndroidManifest.xml
            fi
      - run:
          name: Configure WebView Navigation
          command: |
            MAIN_ACTIVITY="android/app/src/main/java/org/ilovefreegle/dev/MainActivity.java"
            mkdir -p "$(dirname "$MAIN_ACTIVITY")"
            printf '%s\n' \
              'package org.ilovefreegle.dev;' \
              'import android.os.Bundle;' \
              'import android.util.Log;' \
              'import android.webkit.WebView;' \
              'import android.webkit.WebViewClient;' \
              'import android.webkit.WebResourceRequest;' \
              'import com.getcapacitor.BridgeActivity;' \
              'public class MainActivity extends BridgeActivity {' \
              '  private static final String TAG = "FreegleDev";' \
              '  @Override' \
              '  public void onCreate(Bundle savedInstanceState) {' \
              '    super.onCreate(savedInstanceState);' \
              '    WebView.setWebContentsDebuggingEnabled(true);' \
              '    getBridge().getWebView().setWebViewClient(new WebViewClient() {' \
              '      @Override' \
              '      public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {' \
              '        return false;' \
              '      }' \
              '      @Override' \
              '      public boolean shouldOverrideUrlLoading(WebView view, String url) {' \
              '        return false;' \
              '      }' \
              '    });' \
              '  }' \
              '}' > "$MAIN_ACTIVITY"
      - run:
          name: Make gradlew executable
          command: chmod +x android/gradlew
      - run:
          name: Create Debug Keystore
          command: |
            mkdir -p ~/.android
            if [ ! -f ~/.android/debug.keystore ]; then
              keytool -genkey -v \
                -keystore ~/.android/debug.keystore \
                -storepass android \
                -alias androiddebugkey \
                -keypass android \
                -keyalg RSA \
                -keysize 2048 \
                -validity 10000 \
                -dname "CN=Android Debug,O=Android,C=US"
            fi
      - run:
          name: Build Dev App APK
          command: |
            cd android
            ./gradlew assembleDebug --stacktrace
            ls -lh app/build/outputs/apk/debug/
      - store_artifacts:
          path: android/app/build/outputs/apk/debug/app-debug.apk
          destination: freegle-dev.apk

  build-ios-testflight:
    executor: macos-executor
    working_directory: ~/project/iznik-nuxt3
    steps:
      - checkout:
          path: ~/project
      - run:
          name: Install Node.js 22
          command: |
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.0/install.sh | bash
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 22
            nvm use 22
            nvm alias default 22
            echo 'export NVM_DIR="$HOME/.nvm"' >> $BASH_ENV
            echo '[ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"' >> $BASH_ENV
          max_auto_reruns: 3
          auto_rerun_delay: 10s
      - run:
          name: Verify Node.js and npm versions
          command: |
            node --version
            npm --version
      - run:
          name: Install Node.js Dependencies
          command: |
            npm ci
            npm install @rollup/rollup-darwin-arm64 @oxc-parser/binding-darwin-arm64 @oxc-transform/binding-darwin-arm64 @oxc-minify/binding-darwin-arm64 --prefer-offline || true
            npm update @freegle/capacitor-push-notifications-cap7
          max_auto_reruns: 3
          auto_rerun_delay: 10s
      - run:
          name: Generate Version Number
          command: |
            CURRENT_VERSION="${CURRENT_VERSION:-100.0.0}"
            major=$(echo "$CURRENT_VERSION" | cut -d. -f1)
            minor=$(echo "$CURRENT_VERSION" | cut -d. -f2)
            patch=$(echo "$CURRENT_VERSION" | cut -d. -f3)
            NEW_PATCH=$((patch + 1))
            NEW_VERSION="$major.$minor.$NEW_PATCH"
            if [ "$major" -lt 100 ]; then
              NEW_VERSION="100.0.0"
            fi
            echo "$NEW_VERSION" > .new_version
            sed -i '' "s/MOBILE_VERSION: '[0-9]*\.[0-9]*\.[0-9]*'/MOBILE_VERSION: '$NEW_VERSION'/" config.js
      - run:
          name: Build Nuxt App
          command: |
            export NODE_OPTIONS="--max-old-space-size=3584"
            export ISAPP=true
            export APP_ENV=production
            export TUS_UPLOADER=https://uploads.ilovefreegle.org:8080
            export IMAGE_DELIVERY=https://delivery.ilovefreegle.org
            if [ -n "$SENTRY_DSN_APP_FD" ]; then
              export SENTRY_DSN="$SENTRY_DSN_APP_FD"
            fi
            npm run generate
          max_auto_reruns: 2
          auto_rerun_delay: 30s
      - restore_cache:
          keys:
            - pods-v1-{{ checksum "ios/App/Podfile" }}
            - pods-v1-
      - run:
          name: Sync Capacitor to iOS
          command: |
            for attempt in 1 2 3; do
              if npx cap sync ios; then break; fi
              if [ $attempt -lt 3 ]; then sleep 30; else exit 1; fi
            done
      - save_cache:
          key: pods-v1-{{ checksum "ios/App/Podfile" }}
          paths:
            - ios/App/Pods
            - ~/.cocoapods
      - run:
          name: Setup Firebase Configuration for iOS
          command: |
            if [ -n "$GOOGLE_SERVICE_INFO_PLIST_BASE64" ]; then
              echo "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | tr -d '\n' | base64 --decode > ios/App/App/GoogleService-Info.plist
            else
              echo "GOOGLE_SERVICE_INFO_PLIST_BASE64 not set"; exit 1
            fi
      - run:
          name: Install Fastlane
          command: |
            bundle config set --local path 'vendor/bundle'
            bundle config set --local frozen true
            bundle install
          max_auto_reruns: 3
          auto_rerun_delay: 10s
      - run:
          name: Setup iOS Certificates
          command: |
            mkdir -p ~/certificates
            echo "$IOS_DISTRIBUTION_CERT" | tr -d '\n' | base64 --decode > ~/certificates/ios_distribution.p12
            echo "$IOS_PROVISIONING_PROFILE" | tr -d '\n' | base64 --decode > ~/certificates/ios_appstore.mobileprovision
            KEYCHAIN_PATH=~/Library/Keychains/temp.keychain-db
            KEYCHAIN_PASSWORD=circleci
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
            security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security default-keychain -s "$KEYCHAIN_PATH"
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
            echo "export IOS_CERTIFICATE_PATH=~/certificates/ios_distribution.p12" >> $BASH_ENV
            echo "export IOS_PROVISIONING_PROFILE_PATH=~/certificates/ios_appstore.mobileprovision" >> $BASH_ENV
            echo "export KEYCHAIN_NAME=$KEYCHAIN_PATH" >> $BASH_ENV
            echo "export KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $BASH_ENV
      - run:
          name: Build and Deploy to TestFlight
          command: |
            export TERM=xterm-256color
            bundle exec fastlane ios beta
          no_output_timeout: 30m
      - run:
          name: Update CircleCI Version Variable
          command: |
            if [ ! -f .new_version ]; then exit 0; fi
            NEW_VERSION=$(cat .new_version)
            curl -X DELETE \
              -H "Circle-Token: ${CIRCLECI_API_TOKEN}" \
              "https://circleci.com/api/v2/project/gh/Freegle/Iznik/envvar/CURRENT_VERSION"
            curl -X POST \
              -H "Circle-Token: ${CIRCLECI_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"CURRENT_VERSION\",\"value\":\"${NEW_VERSION}\"}" \
              "https://circleci.com/api/v2/project/gh/Freegle/Iznik/envvar"
      - store_artifacts:
          path: build/
          destination: ios-build
