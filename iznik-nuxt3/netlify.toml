# Freegle Netlify configuration
[build.environment]
NODE_VERSION = "22"
NPM_FLAGS = "--legacy-peer-deps"

# Build command and publish dir are set per-site in the Netlify UI/API
# because Freegle and ModTools share this base directory but build differently.
# netlify.toml command/publish would override per-site API settings.

# Return 404 for requests from old code. This avoids the function call, which costs.
[[redirects]]
from = "/api/*"
to = "/"
status = 404
force = true

[[redirects]]
from = "/sw.js*"
to = "/"
status = 404
force = true

[[redirects]]
from = "/gimg*"
to = "/"
status = 404
force = true

[[redirects]]
from = "/uimg*"
to = "/"
status = 404
force = true
